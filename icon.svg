<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- Halftone dot field (matches index page) -->
  <defs>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="1.5" fill="#0d3d06"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#dots)"/>

  <!-- Chromatic aberration: pink channel offset up-left -->
  <polygon points="
    326,16
    126,236
    236,236
    156,466
    356,256
    246,256
  " fill="#FF2D78"/>

  <!-- Chromatic aberration: green channel offset down-right -->
  <polygon points="
    354,44
    154,264
    264,264
    184,494
    384,284
    274,284
  " fill="#39FF14"/>

  <!-- Main yellow bolt -->
  <polygon points="
    340,30
    140,250
    250,250
    170,480
    370,270
    260,270
  " fill="#FFE600"/>

  <!-- Inner highlight strip for dimension -->
  <polygon points="
    320,80
    200,232
    240,232
  " fill="#FFF59E" opacity="0.65"/>

  <!-- Spark accents -->
  <polygon points="78,86 92,72 106,86 92,100" fill="#39FF14"/>
  <polygon points="420,108 432,96 444,108 432,120" fill="#FF2D78"/>
  <polygon points="68,408 80,396 92,408 80,420" fill="#FFE600"/>
  <polygon points="430,402 444,388 458,402 444,416" fill="#39FF14"/>
</svg>
