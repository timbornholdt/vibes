<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="vibes">
<meta name="theme-color" content="#141210">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>vibes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --grease-body:    #ff5252;
    --grease-home:    #ffd23f;
    --grease-science: #4fd6ff;
    --grease-music:   #c08bff;
    --grease-games:   #6ee787;
    --grease-tv:      #ff8a3d;
  }

  html { background-color: #0d0c0b; }

  body {
    font-family: 'Courier New', 'Courier', ui-monospace, monospace;
    background-color: #0d0c0b;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 4px),
      radial-gradient(120% 80% at 50% -10%, #20201d 0%, #0d0c0b 70%);
    color: #d9d2c5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 680px; margin: 0 auto; padding: 36px 24px 80px; }

  header { margin-bottom: 8px; }
  .kicker {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: #8a8275;
  }
  h1 {
    font-size: clamp(40px, 11vw, 96px);
    font-weight: 700;
    letter-spacing: 1px;
    color: #f3ecdd;
    text-transform: lowercase;
    margin: 2px 0;
    line-height: 0.95;
  }

  /* ── Control rail ── */
  .rail {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin: 26px 0 6px;
  }
  .chip {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #cfc7b8;
    background: transparent;
    border: 1px solid #4a443a;
    border-radius: 2px;
    padding: 7px 13px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .chip:hover { border-color: #7a7263; }
  .chip.on { color: #161412; font-weight: 700; }
  .chip[data-cat="all"].on     { background: #d9d2c5; border-color: #d9d2c5; }
  .chip[data-cat="body"].on    { background: var(--grease-body);    border-color: var(--grease-body); }
  .chip[data-cat="home"].on    { background: var(--grease-home);    border-color: var(--grease-home); }
  .chip[data-cat="science"].on { background: var(--grease-science); border-color: var(--grease-science); }
  .chip[data-cat="music"].on   { background: var(--grease-music);   border-color: var(--grease-music); }
  .chip[data-cat="games"].on   { background: var(--grease-games);   border-color: var(--grease-games); }
  .chip[data-cat="tv"].on      { background: var(--grease-tv);      border-color: var(--grease-tv); }

  .find {
    margin-left: auto;
    font-size: 16px;
    font-family: inherit;
    color: #f3ecdd;
    background: rgba(0,0,0,0.3);
    border: 1px solid #4a443a;
    border-radius: 2px;
    padding: 8px 12px;
    width: 260px;
    max-width: 100%;
    outline: none;
  }
  .find::placeholder { color: #6a6356; }
  .find:focus { border-color: #7a7263; }

  @media (max-width: 560px) {
    .find { margin-left: 0; flex: 1 1 100%; width: 100%; }
    .cmdbar { justify-content: flex-start; }
  }

  /* command hint under the rail */
  .cmdbar {
    min-height: 18px;
    margin: 6px 0 18px;
    padding-bottom: 16px;
    border-bottom: 1px dashed #3a352d;
    font-size: 11px;
    color: #6a6356;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .cmdbar .key {
    color: #161412; background: #c9b07a;
    padding: 0 5px; border-radius: 2px; font-weight: 700;
  }
  .cmdbar b { color: #d9d2c5; }

  /* ── List ── */
  .sheet {
    display: flex;
    flex-direction: column;
    border-top: 1px solid #2c2820;
  }

  .frame {
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 6px;
    border-bottom: 1px solid #2c2820;
    transition: background 0.12s;
  }
  .frame:hover { background: rgba(255,255,255,0.035); }
  .frame.lead { box-shadow: inset 3px 0 0 #c9b07a; background: rgba(201,176,122,0.07); }

  .icon-box {
    flex-shrink: 0;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #1c1a16;
    border-radius: 8px;
    background: radial-gradient(120% 120% at 50% 30%, #1c1a16 0%, #0a0a09 72%);
  }
  .icon-box svg {
    width: 60%; height: 60%;
    filter: drop-shadow(0 0 5px currentColor);
    transition: transform 0.16s ease;
  }
  .frame:hover .icon-box svg { transform: scale(1.1); }

  .body { min-width: 0; flex: 1; }
  .title-row { display: flex; align-items: center; gap: 8px; }
  .title {
    font-size: 15px;
    font-weight: 700;
    color: #f3ecdd;
    letter-spacing: 0.3px;
    line-height: 1.2;
  }
  .cat-chip {
    flex-shrink: 0;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: #161412;
    padding: 1px 6px;
    border-radius: 2px;
  }
  .desc {
    font-size: 12px; line-height: 1.4; color: #9b9485;
    margin-top: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .chev { flex-shrink: 0; color: #4a443a; font-size: 16px; }

  .none { padding: 40px 0; color: #8a8275; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">junk.timbornholdt.com</div>
    <h1>vibes</h1>
  </header>

  <div class="rail" id="rail">
    <button class="chip on" data-cat="all">All</button>
    <button class="chip" data-cat="body">Body</button>
    <button class="chip" data-cat="home">Home</button>
    <button class="chip" data-cat="science">Science</button>
    <button class="chip" data-cat="music">Music</button>
    <button class="chip" data-cat="games">Games</button>
    <button class="chip" data-cat="tv">TV</button>
    <input class="find" id="find" type="text" placeholder="search, or type a name + ↵ — try “random”" autocomplete="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="cmdbar" id="cmdbar"></div>

  <div class="sheet" id="sheet"></div>

</div>

<script>
  const tools = [
    { file: "90s-lunch-wheel.html", title: "Wheel of Lunch", cat: "body", desc: "Spin a cheesy 90s game-show wheel rendered on a low-res tube TV to pick a balanced, high-protein lunch. Synth ticking and a win fanfare included." },
    { file: "paver-patio-planner.html", title: "Paver Patio Planner", cat: "home", desc: "Lay out a whole-paver field inside a wall opening, letting garden beds absorb the remainder so you never cut a block. Live top-down plan plus a materials list." },
    { file: "home-improvement-todo.html", title: "Patio Project To-Do", cat: "home", desc: "Mobile-first to-do list for the back-patio rebuild. Drag to reorder, swipe through priorities, all saved on-device." },
    { file: "simpsons-episode-rater.html", title: "The Simpsons Episode Rater", cat: "tv", desc: "Rate every episode from the golden-age seasons 1-8, with synopses. Export your scores and pool them with friends." },
    { file: "back-routine.html",   title: "Nightly Back Routine",     cat: "body",    desc: "Guided back mobility with hold timers and a daily streak." },
    { file: "tattoo-care.html",    title: "Skull / Marshmallow Care", cat: "body",    desc: "Tattoo aftercare timeline that auto-hides past phases." },
    { file: "house-gripes.html",   title: "Stuff That Sucks",         cat: "home",    desc: "Household annoyances that climb the list each time they bug you." },
    { file: "patio.html",          title: "Patio",                    cat: "home",    desc: "Visualize design options for the back patio." },
    { file: "anatomy-lab.html",    title: "Anatomy Lab",              cat: "science", desc: "Tap any bone, muscle, or organ to learn what it does." },
    { file: "lofi-guide.html",     title: "A Field Guide to Lo-Fi",   cat: "music",   desc: "A checkable listening path through the genre's foundations." },
    { file: "music-syllabus.html", title: "The Syllabus",             cat: "music",   desc: "A 14-album guided listen across punk, emo, folk and more." },
    { file: "ps2-curriculum.html", title: "PS2 Gaming Curriculum",    cat: "games",   desc: "12 all-timers sequenced by genre. A syllabus for games." },
  ];
  const greaseColor = {
    body: "var(--grease-body)", home: "var(--grease-home)", science: "var(--grease-science)",
    music: "var(--grease-music)", games: "var(--grease-games)",
  };

  // Hand-drawn line-art icon per page. viewBox 0 0 96 96, stroke=currentColor
  // so each card tints it with its category color. New tools need one of these.
  const svg = (inner) =>
    `<svg viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
  const icons = {
    // game-show wheel with a fork pointer
    "90s-lunch-wheel.html": svg(`
      <circle cx="48" cy="50" r="24"/>
      <path d="M48 26v48M24 50h48M31 33l34 34M65 33 31 67"/>
      <path d="M48 14v9" stroke-width="6"/>
      <circle cx="48" cy="50" r="4" fill="currentColor" stroke="none"/>`),
    // paver grid with one open bed strip
    "paver-patio-planner.html": svg(`
      <rect x="20" y="22" width="56" height="52" rx="4"/>
      <path d="M38 22v52M57 22v52M20 40h56M20 57h56"/>
      <rect x="57" y="22" width="19" height="52" fill="currentColor" stroke="none" opacity="0.35"/>`),
    // clipboard checklist
    "home-improvement-todo.html": svg(`
      <rect x="26" y="24" width="44" height="54" rx="5"/>
      <rect x="38" y="18" width="20" height="12" rx="3" fill="currentColor" stroke="none"/>
      <path d="M34 44l4 4 7-8" stroke-width="4.5"/>
      <path d="M34 62l4 4 7-8" stroke-width="4.5"/>
      <path d="M54 44h10M54 62h10"/>`),
    // retro television set
    "simpsons-episode-rater.html": svg(`
      <rect x="20" y="38" width="56" height="40" rx="5"/>
      <path d="M41 38 33 22M55 38 63 22"/>
      <rect x="28" y="46" width="30" height="24" rx="2"/>
      <circle cx="68" cy="52" r="2.6" fill="currentColor" stroke="none"/>
      <circle cx="68" cy="62" r="2.6" fill="currentColor" stroke="none"/>`),
    // spine + crescent moon
    "back-routine.html": svg(`
      <path d="M68 14a16 16 0 1 0 13 25 13 13 0 0 1-13-25z" fill="currentColor" stroke="none"/>
      <path d="M40 24c-7 16-7 36 0 52"/>
      <path d="M33 32h15M32 44h15M33 56h15M35 68h14"/>`),
    // skull
    "tattoo-care.html": svg(`
      <path d="M26 46a22 22 0 0 1 44 0c0 9-4 13-4 19 0 4-3 6-7 6H37c-4 0-7-2-7-6 0-6-4-10-4-19z"/>
      <circle cx="39" cy="46" r="5.5" fill="currentColor" stroke="none"/>
      <circle cx="57" cy="46" r="5.5" fill="currentColor" stroke="none"/>
      <path d="M48 56l-3 6h6z" fill="currentColor" stroke="none"/>
      <path d="M42 72v5M48 72v5M54 72v5"/>`),
    // house with an exclamation
    "house-gripes.html": svg(`
      <path d="M22 46 48 24l26 22"/>
      <path d="M29 42v30h38V42"/>
      <path d="M48 50v13"/>
      <circle cx="48" cy="69" r="2.6" fill="currentColor" stroke="none"/>`),
    // patio umbrella
    "patio.html": svg(`
      <path d="M22 42a26 16 0 0 1 52 0z" fill="currentColor" stroke="none"/>
      <path d="M48 42v32"/>
      <path d="M30 74h36"/>
      <path d="M48 26v-6"/>`),
    // anatomical heart
    "anatomy-lab.html": svg(`
      <path d="M48 44c-5-9-22-8-22 7 0 13 17 20 22 26 5-6 22-13 22-26 0-15-17-16-22-7z" fill="currentColor" stroke="none"/>
      <path d="M40 30v8M52 26c0 7-5 9-5 15"/>`),
    // cassette tape
    "lofi-guide.html": svg(`
      <rect x="18" y="28" width="60" height="40" rx="6"/>
      <circle cx="38" cy="45" r="6"/>
      <circle cx="58" cy="45" r="6"/>
      <path d="M30 60h36"/>`),
    // vinyl record
    "music-syllabus.html": svg(`
      <circle cx="48" cy="48" r="26"/>
      <circle cx="48" cy="48" r="9"/>
      <circle cx="48" cy="48" r="2.4" fill="currentColor" stroke="none"/>`),
    // game controller
    "ps2-curriculum.html": svg(`
      <path d="M34 38h28c9 0 16 7 16 16 0 7-9 9-13 3l-3-5H36l-3 5c-4 6-13 4-13-3 0-9 7-16 14-16z"/>
      <path d="M28 50h10M33 45v10"/>
      <circle cx="60" cy="48" r="2.4" fill="currentColor" stroke="none"/>
      <circle cx="67" cy="54" r="2.4" fill="currentColor" stroke="none"/>`),
  };

  const sheet = document.getElementById("sheet");
  const find = document.getElementById("find");
  const cmdbar = document.getElementById("cmdbar");
  let activeCat = "all";
  let term = "";
  let visible = [];

  const isRandom = (t) => t === "random" || t === "rand" || t === "r";

  function compute() {
    return tools.filter(t => {
      const catOk = activeCat === "all" || t.cat === activeCat;
      // a bare "random" command shouldn't empty the grid
      const textOk = !term || isRandom(term)
        || (t.title + " " + t.desc + " " + t.cat).toLowerCase().includes(term);
      return catOk && textOk;
    });
  }

  function render() {
    visible = compute();
    if (!visible.length) {
      sheet.innerHTML = `<div class="none">// no negatives match this filter</div>`;
    } else {
      sheet.innerHTML = visible.map((t, i) => `
        <a class="frame${term && !isRandom(term) && i === 0 ? " lead" : ""}" href="${t.file}">
          <div class="icon-box" style="color:${greaseColor[t.cat]}">${icons[t.file] || ""}</div>
          <div class="body">
            <div class="title-row">
              <span class="title">${t.title}</span>
              <span class="cat-chip" style="background:${greaseColor[t.cat]}">${t.cat}</span>
            </div>
            <div class="desc">${t.desc}</div>
          </div>
          <span class="chev">&rsaquo;</span>
        </a>`).join("");
    }
    renderHint();
  }

  function renderHint() {
    if (isRandom(term)) {
      cmdbar.innerHTML = `<span class="key">↵</span><span>opens a <b>random</b> tool</span>`;
    } else if (term && visible.length) {
      cmdbar.innerHTML = `<span class="key">↵</span><span>opens <b>${visible[0].title}</b></span>`;
    } else {
      cmdbar.innerHTML = "";
    }
  }

  document.getElementById("rail").addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    activeCat = chip.dataset.cat;
    document.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c === chip));
    render();
  });

  find.addEventListener("input", (e) => {
    term = e.target.value.trim().toLowerCase();
    render();
  });

  find.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (isRandom(term)) {
      const pool = visible.length ? visible : tools;
      window.location.href = pool[Math.floor(Math.random() * pool.length)].file;
    } else if (visible.length) {
      window.location.href = visible[0].file;
    }
  });

  render();

  if ('serviceWorker' in navigator) {
    const hadController = !!navigator.serviceWorker.controller;
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!hadController || refreshing) return;
      refreshing = true;
      location.reload();
    });
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
