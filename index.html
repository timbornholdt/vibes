<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="vibes">
<meta name="theme-color" content="#141210">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>vibes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --grease-body:    #ff5252;
    --grease-home:    #ffd23f;
    --grease-science: #4fd6ff;
    --grease-music:   #c08bff;
    --grease-games:   #6ee787;
  }

  body {
    font-family: 'Courier New', 'Courier', ui-monospace, monospace;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 4px),
      radial-gradient(120% 80% at 50% -10%, #20201d 0%, #0d0c0b 70%);
    color: #d9d2c5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 36px 24px 80px; }

  header { margin-bottom: 8px; }
  .kicker {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: #8a8275;
  }
  h1 {
    font-size: clamp(40px, 11vw, 96px);
    font-weight: 700;
    letter-spacing: 1px;
    color: #f3ecdd;
    text-transform: lowercase;
    margin: 2px 0;
    line-height: 0.95;
  }

  /* ── Control rail ── */
  .rail {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin: 26px 0 6px;
  }
  .chip {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #cfc7b8;
    background: transparent;
    border: 1px solid #4a443a;
    border-radius: 2px;
    padding: 7px 13px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .chip:hover { border-color: #7a7263; }
  .chip.on { color: #161412; font-weight: 700; }
  .chip[data-cat="all"].on     { background: #d9d2c5; border-color: #d9d2c5; }
  .chip[data-cat="body"].on    { background: var(--grease-body);    border-color: var(--grease-body); }
  .chip[data-cat="home"].on    { background: var(--grease-home);    border-color: var(--grease-home); }
  .chip[data-cat="science"].on { background: var(--grease-science); border-color: var(--grease-science); }
  .chip[data-cat="music"].on   { background: var(--grease-music);   border-color: var(--grease-music); }
  .chip[data-cat="games"].on   { background: var(--grease-games);   border-color: var(--grease-games); }

  .find {
    margin-left: auto;
    font-size: 16px;
    font-family: inherit;
    color: #f3ecdd;
    background: rgba(0,0,0,0.3);
    border: 1px solid #4a443a;
    border-radius: 2px;
    padding: 8px 12px;
    width: 260px;
    max-width: 100%;
    outline: none;
  }
  .find::placeholder { color: #6a6356; }
  .find:focus { border-color: #7a7263; }

  @media (max-width: 560px) {
    .find { margin-left: 0; flex: 1 1 100%; width: 100%; }
    .cmdbar { justify-content: flex-start; }
  }

  /* command hint under the rail */
  .cmdbar {
    min-height: 18px;
    margin: 6px 0 18px;
    padding-bottom: 16px;
    border-bottom: 1px dashed #3a352d;
    font-size: 11px;
    color: #6a6356;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .cmdbar .key {
    color: #161412; background: #c9b07a;
    padding: 0 5px; border-radius: 2px; font-weight: 700;
  }
  .cmdbar b { color: #d9d2c5; }

  /* ── Grid ── */
  .sheet {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 30px 24px;
  }

  .frame {
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    background: #0a0a09;
    border: 1px solid #2c2820;
    padding: 12px;
    transition: transform 0.14s, box-shadow 0.14s, border-color 0.14s;
  }
  .frame:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 30px rgba(0,0,0,0.5);
  }
  .frame.lead { border-color: #c9b07a; }

  .neg {
    position: relative;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4 / 3;
    border: 1px solid #1c1a16;
  }
  .neg iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1100px;
    height: 825px;
    transform: scale(0.227);
    transform-origin: top left;
    border: 0;
    pointer-events: none;
    background: #fff;
  }
  .neg .tint {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,30,40,0.05), rgba(0,0,0,0.18));
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  .grease {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 1px;
    color: #161412;
    transform: rotate(-3deg);
    z-index: 2;
  }
  .label {
    margin-top: 11px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .label .title {
    font-size: 14px;
    font-weight: 700;
    color: #f3ecdd;
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .label .file { font-size: 10px; color: #6a6356; white-space: nowrap; }
  .desc { font-size: 11.5px; line-height: 1.5; color: #9b9485; margin-top: 5px; }

  .none { grid-column: 1/-1; padding: 40px 0; color: #8a8275; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">junk.timbornholdt.com</div>
    <h1>vibes</h1>
  </header>

  <div class="rail" id="rail">
    <button class="chip on" data-cat="all">All</button>
    <button class="chip" data-cat="body">Body</button>
    <button class="chip" data-cat="home">Home</button>
    <button class="chip" data-cat="science">Science</button>
    <button class="chip" data-cat="music">Music</button>
    <button class="chip" data-cat="games">Games</button>
    <input class="find" id="find" type="text" placeholder="search, or type a name + ↵ — try “random”" autocomplete="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="cmdbar" id="cmdbar"></div>

  <div class="sheet" id="sheet"></div>

</div>

<script>
  const tools = [
    { file: "back-routine.html",   title: "Nightly Back Routine",     cat: "body",    desc: "Guided back mobility with hold timers and a daily streak." },
    { file: "tattoo-care.html",    title: "Skull / Marshmallow Care", cat: "body",    desc: "Tattoo aftercare timeline that auto-hides past phases." },
    { file: "house-gripes.html",   title: "Stuff That Sucks",         cat: "home",    desc: "Household annoyances that climb the list each time they bug you." },
    { file: "patio.html",          title: "Patio",                    cat: "home",    desc: "Visualize design options for the back patio." },
    { file: "anatomy-lab.html",    title: "Anatomy Lab",              cat: "science", desc: "Tap any bone, muscle, or organ to learn what it does." },
    { file: "lofi-guide.html",     title: "A Field Guide to Lo-Fi",   cat: "music",   desc: "A checkable listening path through the genre's foundations." },
    { file: "music-syllabus.html", title: "The Syllabus",             cat: "music",   desc: "A 14-album guided listen across punk, emo, folk and more." },
    { file: "ps2-curriculum.html", title: "PS2 Gaming Curriculum",    cat: "games",   desc: "12 all-timers sequenced by genre. A syllabus for games." },
  ];
  const greaseColor = {
    body: "var(--grease-body)", home: "var(--grease-home)", science: "var(--grease-science)",
    music: "var(--grease-music)", games: "var(--grease-games)",
  };

  const sheet = document.getElementById("sheet");
  const find = document.getElementById("find");
  const cmdbar = document.getElementById("cmdbar");
  let activeCat = "all";
  let term = "";
  let visible = [];

  const isRandom = (t) => t === "random" || t === "rand" || t === "r";

  function compute() {
    return tools.filter(t => {
      const catOk = activeCat === "all" || t.cat === activeCat;
      // a bare "random" command shouldn't empty the grid
      const textOk = !term || isRandom(term)
        || (t.title + " " + t.desc + " " + t.cat).toLowerCase().includes(term);
      return catOk && textOk;
    });
  }

  function render() {
    visible = compute();
    if (!visible.length) {
      sheet.innerHTML = `<div class="none">// no negatives match this filter</div>`;
    } else {
      sheet.innerHTML = visible.map((t, i) => `
        <a class="frame${term && !isRandom(term) && i === 0 ? " lead" : ""}" href="${t.file}">
          <div class="neg">
            <span class="grease" style="background:${greaseColor[t.cat]}">${t.cat}</span>
            <iframe src="${t.file}" loading="lazy" scrolling="no" tabindex="-1" title="${t.title} preview"></iframe>
            <div class="tint"></div>
          </div>
          <div class="label">
            <span class="title">${t.title}</span>
            <span class="file">${t.file}</span>
          </div>
          <div class="desc">${t.desc}</div>
        </a>`).join("");
    }
    renderHint();
  }

  function renderHint() {
    if (isRandom(term)) {
      cmdbar.innerHTML = `<span class="key">↵</span><span>opens a <b>random</b> tool</span>`;
    } else if (term && visible.length) {
      cmdbar.innerHTML = `<span class="key">↵</span><span>opens <b>${visible[0].title}</b></span>`;
    } else {
      cmdbar.innerHTML = "";
    }
  }

  document.getElementById("rail").addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    activeCat = chip.dataset.cat;
    document.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c === chip));
    render();
  });

  find.addEventListener("input", (e) => {
    term = e.target.value.trim().toLowerCase();
    render();
  });

  find.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (isRandom(term)) {
      const pool = visible.length ? visible : tools;
      window.location.href = pool[Math.floor(Math.random() * pool.length)].file;
    } else if (visible.length) {
      window.location.href = visible[0].file;
    }
  });

  render();

  if ('serviceWorker' in navigator) {
    const hadController = !!navigator.serviceWorker.controller;
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!hadController || refreshing) return;
      refreshing = true;
      location.reload();
    });
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
