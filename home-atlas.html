<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="vibes">
<meta name="theme-color" content="#0e1a24">
<title>vibes · atlas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --body:    #ff7a9c;
    --home:    #7ad19a;
    --science: #6fd2ef;
    --music:   #c4a3ff;
    --games:   #ffc46b;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    background: #0e1a24;
    color: #e7ecef;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }

  /* ── HUD ── */
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(7,14,20,0.85), transparent);
  }
  .brand { pointer-events: auto; }
  .brand .name {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
    font-variant: small-caps;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }
  .brand .name b { color: var(--games); }
  .brand .tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8fb0c0;
    font-family: ui-monospace, monospace;
  }

  .search {
    pointer-events: auto;
    position: relative;
    width: min(280px, 50vw);
  }
  .search input {
    width: 100%;
    font-size: 16px;
    font-family: ui-monospace, monospace;
    color: #eaf2f6;
    background: rgba(10,20,28,0.7);
    border: 1px solid #2c4654;
    border-radius: 3px;
    padding: 9px 12px;
    outline: none;
    backdrop-filter: blur(6px);
  }
  .search input::placeholder { color: #6f93a4; }
  .search input:focus { border-color: var(--science); }
  .suggest {
    position: absolute;
    top: calc(100% + 5px); left: 0; right: 0;
    background: rgba(10,20,28,0.96);
    border: 1px solid #2c4654;
    border-radius: 3px;
    overflow: hidden;
    display: none;
    backdrop-filter: blur(6px);
  }
  .suggest.show { display: block; }
  .suggest button {
    display: block; width: 100%; text-align: left;
    background: none; border: 0;
    color: #d7e3ea;
    font-family: ui-monospace, monospace;
    font-size: 13px;
    padding: 9px 12px;
    cursor: pointer;
  }
  .suggest button:hover { background: rgba(111,210,239,0.15); }
  .suggest .none { padding: 9px 12px; color: #6f93a4; font-size: 13px; }

  /* ── Map viewport ── */
  #viewport {
    position: absolute;
    inset: 0;
    cursor: grab;
    background:
      radial-gradient(120% 120% at 30% 20%, #16303f 0%, #0c1822 60%, #081119 100%);
    overflow: hidden;
  }
  #viewport.dragging { cursor: grabbing; }
  #map {
    position: absolute;
    top: 0; left: 0;
    width: 1600px; height: 1100px;
    transform-origin: 0 0;
    will-change: transform;
  }
  #map svg { position: absolute; inset: 0; width: 1600px; height: 1100px; }

  .region-label {
    font-family: ui-monospace, monospace;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    fill: rgba(255,255,255,0.32);
  }

  /* ── Markers ── */
  .marker {
    position: absolute;
    transform: translate(-50%, -100%);
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    width: 168px;
  }
  .pin {
    width: 20px; height: 20px;
    margin: 0 auto 6px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid rgba(0,0,0,0.4);
    box-shadow: 0 4px 10px rgba(0,0,0,0.45);
    transition: transform 0.14s;
  }
  .marker:hover .pin { transform: rotate(-45deg) scale(1.25); }
  .pin.body    { background: var(--body); }
  .pin.home    { background: var(--home); }
  .pin.science { background: var(--science); }
  .pin.music   { background: var(--music); }
  .pin.games   { background: var(--games); }

  .cap {
    display: inline-block;
    font-size: 14px;
    font-weight: 700;
    color: #f2f6f8;
    background: rgba(8,16,22,0.82);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 3px;
    padding: 4px 9px;
    line-height: 1.2;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .tip {
    margin-top: 6px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    line-height: 1.45;
    color: #b9cdd7;
    max-width: 168px;
    opacity: 0;
    transform: translateY(-3px);
    transition: opacity 0.14s, transform 0.14s;
    pointer-events: none;
  }
  .marker:hover .tip { opacity: 1; transform: translateY(0); }

  .marker.flash .pin { animation: ping 1.1s ease-out 2; }
  @keyframes ping {
    0% { box-shadow: 0 4px 10px rgba(0,0,0,0.45), 0 0 0 0 rgba(255,255,255,0.55); }
    100% { box-shadow: 0 4px 10px rgba(0,0,0,0.45), 0 0 0 26px rgba(255,255,255,0); }
  }

  /* ── Controls + legend ── */
  .zoom {
    position: fixed;
    right: 18px; bottom: 18px;
    z-index: 20;
    display: flex; flex-direction: column; gap: 6px;
  }
  .zoom button {
    width: 42px; height: 42px;
    font-size: 22px;
    font-family: ui-monospace, monospace;
    color: #eaf2f6;
    background: rgba(10,20,28,0.8);
    border: 1px solid #2c4654;
    border-radius: 4px;
    cursor: pointer;
    backdrop-filter: blur(6px);
  }
  .zoom button:hover { border-color: var(--science); }

  .legend {
    position: fixed;
    left: 18px; bottom: 18px;
    z-index: 20;
    background: rgba(10,20,28,0.78);
    border: 1px solid #2c4654;
    border-radius: 4px;
    padding: 12px 14px;
    backdrop-filter: blur(6px);
    font-family: ui-monospace, monospace;
  }
  .legend h3 {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: #8fb0c0; margin-bottom: 9px; font-weight: 400;
  }
  .legend button {
    display: flex; align-items: center; gap: 8px;
    background: none; border: 0; cursor: pointer;
    color: #d7e3ea; font: inherit; font-size: 12px;
    padding: 3px 0; width: 100%; text-align: left;
  }
  .legend button:hover { color: #fff; }
  .legend .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .legend .ct { margin-left: auto; color: #6f93a4; }

  .hint {
    position: fixed;
    left: 50%; bottom: 16px;
    transform: translateX(-50%);
    z-index: 19;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: #6f93a4;
    letter-spacing: 1px;
    pointer-events: none;
    opacity: 0.8;
  }
  @media (max-width: 640px) { .hint { display: none; } }
</style>
</head>
<body>

<div class="hud">
  <div class="brand">
    <div class="name">vibes <b>atlas</b></div>
    <div class="tag">junk.timbornholdt.com</div>
  </div>
  <div class="search">
    <input id="q" type="text" placeholder="search the map…" autocomplete="off">
    <div class="suggest" id="suggest"></div>
  </div>
</div>

<div id="viewport">
  <div id="map">
    <svg viewBox="0 0 1600 1100" id="mapsvg" aria-hidden="true"></svg>
  </div>
</div>

<div class="legend" id="legend"><h3>Territories</h3></div>

<div class="zoom">
  <button id="zin" aria-label="zoom in">+</button>
  <button id="zout" aria-label="zoom out">−</button>
  <button id="zreset" aria-label="reset view" style="font-size:14px;">⌂</button>
</div>

<div class="hint">drag to roam · scroll to zoom · click a pin to open</div>

<script>
  const regions = {
    body:    { name: "Bodylands",   cx: 300,  cy: 520, rx: 230, ry: 200 },
    science: { name: "Origin Isle", cx: 820,  cy: 540, rx: 175, ry: 150 },
    home:    { name: "Home Reach",  cx: 1270, cy: 300, rx: 245, ry: 195 },
    music:   { name: "The Sound",   cx: 1260, cy: 830, rx: 250, ry: 195 },
    games:   { name: "Pixel Coast", cx: 350,  cy: 890, rx: 200, ry: 150 },
  };

  const tools = [
    { file: "back-routine.html",   title: "Back Routine",      cat: "body",    x: 235,  y: 440, desc: "Guided back mobility with hold timers + a daily streak." },
    { file: "tattoo-care.html",    title: "Tattoo Care",       cat: "body",    x: 360,  y: 610, desc: "Aftercare timeline that auto-hides past phases." },
    { file: "anatomy-lab.html",    title: "Anatomy Lab",       cat: "science", x: 820,  y: 545, desc: "Tap a bone, muscle, or organ to learn what it does." },
    { file: "house-gripes.html",   title: "Stuff That Sucks",  cat: "home",    x: 1185, y: 235, desc: "Household gripes that climb the list when they bug you." },
    { file: "patio.html",          title: "Patio",             cat: "home",    x: 1340, y: 360, desc: "Visualize design options for the back patio." },
    { file: "lofi-guide.html",     title: "Field Guide: Lo-Fi",cat: "music",   x: 1175, y: 775, desc: "A checkable path through the genre's foundations." },
    { file: "music-syllabus.html", title: "The Syllabus",      cat: "music",   x: 1345, y: 880, desc: "A 14-album guided listen across five scenes." },
    { file: "ps2-curriculum.html", title: "PS2 Curriculum",    cat: "games",   x: 350,  y: 890, desc: "12 all-timers sequenced by genre." },
  ];

  const colors = { body:"#ff7a9c", home:"#7ad19a", science:"#6fd2ef", music:"#c4a3ff", games:"#ffc46b" };

  // ── Draw regions (SVG blobs + labels + faint links to Origin Isle) ──
  const svg = document.getElementById("mapsvg");
  const SVGNS = "http://www.w3.org/2000/svg";
  // links from science hub to each region
  Object.entries(regions).forEach(([key, r]) => {
    if (key === "science") return;
    const line = document.createElementNS(SVGNS, "line");
    line.setAttribute("x1", regions.science.cx); line.setAttribute("y1", regions.science.cy);
    line.setAttribute("x2", r.cx); line.setAttribute("y2", r.cy);
    line.setAttribute("stroke", "rgba(255,255,255,0.07)");
    line.setAttribute("stroke-width", "2");
    line.setAttribute("stroke-dasharray", "3 9");
    svg.appendChild(line);
  });
  Object.entries(regions).forEach(([key, r]) => {
    const e = document.createElementNS(SVGNS, "ellipse");
    e.setAttribute("cx", r.cx); e.setAttribute("cy", r.cy);
    e.setAttribute("rx", r.rx); e.setAttribute("ry", r.ry);
    e.setAttribute("fill", colors[key] + "14");
    e.setAttribute("stroke", colors[key] + "55");
    e.setAttribute("stroke-width", "2");
    e.setAttribute("stroke-dasharray", "2 8");
    svg.appendChild(e);
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("x", r.cx); t.setAttribute("y", r.cy - r.ry + 22);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("class", "region-label");
    t.textContent = r.name;
    svg.appendChild(t);
  });

  // ── Place markers ──
  const map = document.getElementById("map");
  const markerEls = {};
  tools.forEach(t => {
    const a = document.createElement("a");
    a.className = "marker";
    a.href = t.file;
    a.style.left = t.x + "px";
    a.style.top = t.y + "px";
    a.innerHTML = `
      <div class="pin ${t.cat}"></div>
      <span class="cap">${t.title}</span>
      <div class="tip">${t.desc}</div>`;
    map.appendChild(a);
    markerEls[t.file] = a;
  });

  // ── Legend ──
  const legend = document.getElementById("legend");
  Object.entries(regions).forEach(([key, r]) => {
    const count = tools.filter(t => t.cat === key).length;
    const b = document.createElement("button");
    b.innerHTML = `<span class="dot" style="background:${colors[key]}"></span>${r.name}<span class="ct">${count}</span>`;
    b.addEventListener("click", () => flyTo(r.cx, r.cy, 1.05));
    legend.appendChild(b);
  });

  // ── Pan / zoom ──
  const vp = document.getElementById("viewport");
  let scale = 0.7, tx = 0, ty = 0;
  const MIN = 0.4, MAX = 2.2;

  function clampPan() {
    const vw = vp.clientWidth, vh = vp.clientHeight;
    const mw = 1600 * scale, mh = 1100 * scale;
    const minX = Math.min(0, vw - mw), minY = Math.min(0, vh - mh);
    const maxX = Math.max(0, vw - mw), maxY = Math.max(0, vh - mh);
    // allow some slack so edges aren't glued
    tx = Math.max(minX - 120, Math.min(maxX + 120, tx));
    ty = Math.max(minY - 120, Math.min(maxY + 120, ty));
  }
  function apply() {
    clampPan();
    map.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }
  function center() {
    tx = (vp.clientWidth - 1600 * scale) / 2;
    ty = (vp.clientHeight - 1100 * scale) / 2;
    apply();
  }
  center();
  window.addEventListener("resize", apply);

  function zoomAt(px, py, factor) {
    const ns = Math.max(MIN, Math.min(MAX, scale * factor));
    const k = ns / scale;
    tx = px - (px - tx) * k;
    ty = py - (py - ty) * k;
    scale = ns;
    apply();
  }

  vp.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, e.deltaY < 0 ? 1.12 : 0.89);
  }, { passive: false });

  // drag (mouse + touch via pointer events), with click suppression after real drag
  let down = false, moved = false, sx = 0, sy = 0, downX = 0, downY = 0;
  vp.addEventListener("pointerdown", (e) => {
    down = true; moved = false;
    sx = e.clientX - tx; sy = e.clientY - ty;
    downX = e.clientX; downY = e.clientY;
    vp.classList.add("dragging"); vp.setPointerCapture(e.pointerId);
  });
  vp.addEventListener("pointermove", (e) => {
    if (!down) return;
    if (Math.abs(e.clientX - downX) > 4 || Math.abs(e.clientY - downY) > 4) moved = true;
    tx = e.clientX - sx; ty = e.clientY - sy;
    apply();
  });
  function endDrag() { down = false; vp.classList.remove("dragging"); }
  vp.addEventListener("pointerup", endDrag);
  vp.addEventListener("pointercancel", endDrag);
  // prevent accidental navigation when the gesture was a drag
  map.addEventListener("click", (e) => {
    if (moved) { e.preventDefault(); }
  }, true);

  document.getElementById("zin").addEventListener("click", () => zoomAt(vp.clientWidth/2, vp.clientHeight/2, 1.25));
  document.getElementById("zout").addEventListener("click", () => zoomAt(vp.clientWidth/2, vp.clientHeight/2, 0.8));
  document.getElementById("zreset").addEventListener("click", () => { scale = 0.7; center(); });

  function flyTo(mapX, mapY, targetScale) {
    scale = Math.max(MIN, Math.min(MAX, targetScale));
    tx = vp.clientWidth / 2 - mapX * scale;
    ty = vp.clientHeight / 2 - mapY * scale;
    apply();
  }
  function goToTool(t) {
    flyTo(t.x, t.y - 30, 1.25);
    const el = markerEls[t.file];
    el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
  }

  // ── Search ──
  const q = document.getElementById("q");
  const suggest = document.getElementById("suggest");
  function renderSuggest(term) {
    if (!term) { suggest.classList.remove("show"); suggest.innerHTML = ""; return; }
    const hits = tools.filter(t =>
      (t.title + " " + t.desc + " " + regions[t.cat].name).toLowerCase().includes(term));
    suggest.innerHTML = hits.length
      ? hits.map((t, i) => `<button data-file="${t.file}">${t.title} · <span style="color:${colors[t.cat]}">${regions[t.cat].name}</span></button>`).join("")
      : `<div class="none">no locations found</div>`;
    suggest.classList.add("show");
  }
  q.addEventListener("input", () => renderSuggest(q.value.trim().toLowerCase()));
  q.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const term = q.value.trim().toLowerCase();
      const hit = tools.find(t => (t.title + " " + t.desc).toLowerCase().includes(term));
      if (hit) { goToTool(hit); suggest.classList.remove("show"); }
    }
  });
  suggest.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-file]");
    if (!btn) return;
    const t = tools.find(x => x.file === btn.dataset.file);
    goToTool(t);
    suggest.classList.remove("show");
    q.blur();
  });
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search")) suggest.classList.remove("show");
  });
</script>
</body>
</html>
