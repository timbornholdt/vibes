<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#212529">
<title>Stuff That Sucks</title>
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    line-height: 1.8;
    background-color: #f4ecd8;
    color: #2b2b2b;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 16px 80px;
  }

  .nes-container { background: #fff; }
  .items .nes-container { margin: 0; }

  /* ── Masthead ── */
  .masthead { margin-bottom: 28px; }

  .masthead h1 {
    font-size: 24px;
    line-height: 1.5;
    margin: 0 0 18px;
  }

  .masthead .dot { color: #f7d51d; }

  .tagline { font-size: 10px; line-height: 1.9; color: #f7d51d; margin: 0; }

  /* ── Add form ── */
  .add-form { margin-bottom: 30px; }
  .add-form .nes-field { margin-bottom: 18px; }

  .nes-input, .nes-textarea {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    line-height: 1.6;
  }

  .nes-textarea { min-height: 80px; resize: vertical; }

  label {
    display: block;
    font-size: 10px;
    line-height: 1.8;
    margin-bottom: 10px;
  }

  /* ── Section label ── */
  .section-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    font-size: 10px;
    line-height: 1.8;
    color: #555;
    margin: 0 0 16px;
  }

  /* ── List ── */
  .items { display: flex; flex-direction: column; gap: 20px; }

  .empty { font-size: 10px; line-height: 2; color: #666; padding: 4px 2px 20px; }

  .gripe { cursor: pointer; }

  .gripe-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }

  .rank { font-size: 9px; display: inline-block; margin: 0 0 10px; }

  .gripe-title { font-size: 13px; line-height: 1.6; margin: 0; word-break: break-word; }

  .gripe-notes {
    font-size: 10px;
    line-height: 1.8;
    color: #555;
    margin: 12px 0 0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .gripe-meta {
    font-size: 8px;
    line-height: 1.9;
    color: #777;
    margin: 14px 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
  }

  .gripe-meta b { color: #4a7a2a; }

  .hint { font-size: 8px; line-height: 1.8; color: #5a8a2e; margin: 12px 0 0; }

  /* ── Action buttons ── */
  .gripe-actions {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .gripe-actions .nes-btn { font-size: 9px; padding: 6px 8px; }

  /* ── Inline edit form ── */
  .gripe-edit { width: 100%; }
  .gripe-edit .nes-field { margin-bottom: 16px; }

  .edit-row { display: flex; gap: 10px; margin-top: 4px; }
  .edit-row .nes-btn { font-size: 10px; padding: 8px 10px; }
  .save-btn { flex: 1; }
  .delete-btn { width: 100%; margin-top: 14px; font-size: 10px; padding: 8px 10px; }

  /* ── Archive ── */
  .archive-toggle {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1.8;
    background: none;
    border: none;
    color: #4a7a2a;
    cursor: pointer;
    padding: 0;
    margin-top: 32px;
  }

  .archive-toggle:hover { color: #2b2b2b; }

  .archive { margin-top: 18px; display: none; }
  .archive.open { display: block; }

  .arch-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: #eaddc2;
    border: 3px solid #c8b48a;
    padding: 12px 14px;
    margin-bottom: 12px;
  }

  .arch-title { font-size: 10px; line-height: 1.7; color: #777; text-decoration: line-through; word-break: break-word; }
  .arch-date { font-size: 8px; line-height: 1.8; color: #998; margin-top: 6px; }
  .restore-btn { flex-shrink: 0; font-size: 9px; padding: 6px 8px; }

  /* ── Celebration ── */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    display: none;
  }

  #celebrate {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
    pointer-events: none;
  }

  #celebrate.show { display: flex; }

  .celebrate-word {
    font-family: 'Press Start 2P', monospace;
    font-size: 13vw;
    line-height: 1.3;
    color: #92cc41;
    text-shadow: 4px 4px 0 #2b2b2b;
    text-align: center;
    animation: popUp 0.45s steps(5);
  }

  .celebrate-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    line-height: 1.7;
    margin-top: 26px;
    background: #f7d51d;
    color: #2b2b2b;
    padding: 14px 18px;
    box-shadow: 6px 6px 0 #2b2b2b;
    text-align: center;
    max-width: 92vw;
    word-break: break-word;
    animation: popUp 0.45s 0.1s backwards steps(5);
  }

  @keyframes popUp {
    0%   { transform: scale(0.2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 440px) {
    .page { padding: 20px 12px 60px; }
    .masthead h1 { font-size: 18px; }
    .celebrate-word { font-size: 16vw; }
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="celebrate">
  <div class="celebrate-word">DONE!</div>
  <div class="celebrate-sub" id="celebrate-sub"></div>
</div>

<div class="page">

  <header class="masthead nes-container is-dark is-rounded">
    <h1>Stuff That<br>Sucks<span class="dot">.</span></h1>
    <p class="tagline">This shit sucks. Go fix it.</p>
  </header>

  <div class="add-form nes-container with-title is-rounded">
    <p class="title">Add a gripe</p>
    <div class="nes-field">
      <label for="title">What's bugging you?</label>
      <input id="title" class="nes-input" type="text" placeholder="corner cabinet is a mess" maxlength="120" autocomplete="off">
    </div>
    <div class="nes-field">
      <label for="notes">Notes (optional)</label>
      <textarea id="notes" class="nes-textarea" placeholder="ideas, context, what you've tried"></textarea>
    </div>
    <button id="add-btn" type="button" class="nes-btn is-success">Add to the list</button>
  </div>

  <div class="section-label">
    <span>In order of insistence</span>
    <span id="count"></span>
  </div>

  <div class="items" id="items"></div>
  <div class="empty" id="empty">
    Nothing here yet. Add the first thing that nags you above.<br><br>
    Tap a card each time the annoyance strikes in real life. The more
    recently &amp; often it bugs you, the higher it rises.
  </div>

  <button class="archive-toggle" id="archive-toggle"></button>
  <div class="archive" id="archive"></div>

</div>

<script type="module">
const KEY = 'house-gripes-v1';
const HALF_LIFE_DAYS = 10;
const DAY = 86400000;

let state = load();
let editingId = null;

function load() {
  try {
    const raw = JSON.parse(localStorage.getItem(KEY));
    if (raw && Array.isArray(raw.gripes)) return raw;
  } catch (e) {}
  return { gripes: [], archive: [] };
}

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// Recency-weighted priority: every encounter (tap) decays with a 10-day
// half-life, so a thing that bugged you yesterday outranks one you hammered
// months ago but stopped caring about.
function score(g, now) {
  return g.taps.reduce((sum, t) => sum + Math.pow(0.5, (now - t) / DAY / HALF_LIFE_DAYS), 0);
}

function relTime(ms) {
  const diff = Date.now() - ms;
  if (diff < 60000) return 'just now';
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  const months = Math.floor(days / 30);
  if (months < 12) return months + 'mo ago';
  return Math.floor(months / 12) + 'y ago';
}

function fmtDate(ms) {
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const d = new Date(ms);
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

const itemsEl = document.getElementById('items');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const archiveEl = document.getElementById('archive');
const archiveToggle = document.getElementById('archive-toggle');

function render() {
  const now = Date.now();
  const sorted = [...state.gripes].sort((a, b) => score(b, now) - score(a, now));

  itemsEl.innerHTML = '';
  emptyEl.style.display = sorted.length ? 'none' : 'block';
  countEl.textContent = sorted.length ? sorted.length + ' open' : '';

  sorted.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'nes-container is-rounded gripe';
    card.dataset.id = g.id;

    if (g.id === editingId) {
      card.classList.add('editing');
      card.appendChild(buildEditForm(g));
      itemsEl.appendChild(card);
      return;
    }

    const top = document.createElement('div');
    top.className = 'gripe-top';

    const body = document.createElement('div');

    const rank = document.createElement('span');
    rank.className = 'rank nes-text ' + (i === 0 ? 'is-warning' : i < 3 ? 'is-success' : 'is-disabled');
    rank.textContent = '#' + (i + 1);
    body.appendChild(rank);

    const title = document.createElement('p');
    title.className = 'gripe-title';
    title.textContent = g.title;
    body.appendChild(title);

    if (g.notes) {
      const notes = document.createElement('p');
      notes.className = 'gripe-notes';
      notes.textContent = g.notes;
      body.appendChild(notes);
    }

    const meta = document.createElement('div');
    meta.className = 'gripe-meta';
    const hits = g.taps.length;
    meta.innerHTML =
      'bugged you <b>' + hits + 'x</b>' +
      '<span>last ' + relTime(g.taps[g.taps.length - 1]) + '</span>' +
      '<span>added ' + fmtDate(g.created) + '</span>';
    body.appendChild(meta);

    const hint = document.createElement('p');
    hint.className = 'hint';
    hint.textContent = 'tap when it nags you again, it rises';
    body.appendChild(hint);

    top.appendChild(body);

    const actions = document.createElement('div');
    actions.className = 'gripe-actions';

    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'nes-btn is-warning';
    editBtn.textContent = 'edit';
    editBtn.addEventListener('click', (e) => { e.stopPropagation(); editingId = g.id; render(); });

    const doneBtn = document.createElement('button');
    doneBtn.type = 'button';
    doneBtn.className = 'nes-btn is-success';
    doneBtn.textContent = 'done';
    doneBtn.addEventListener('click', (e) => { e.stopPropagation(); finish(g.id); });

    actions.appendChild(editBtn);
    actions.appendChild(doneBtn);
    top.appendChild(actions);

    card.appendChild(top);
    card.addEventListener('click', () => bump(g.id, card));
    itemsEl.appendChild(card);
  });

  renderArchive();
}

function buildEditForm(g) {
  const form = document.createElement('div');
  form.className = 'gripe-edit';

  const f1 = document.createElement('div');
  f1.className = 'nes-field';
  const titleLabel = document.createElement('label');
  titleLabel.textContent = "What's bugging you?";
  const titleInput = document.createElement('input');
  titleInput.type = 'text';
  titleInput.className = 'nes-input';
  titleInput.maxLength = 120;
  titleInput.value = g.title;
  f1.appendChild(titleLabel);
  f1.appendChild(titleInput);

  const f2 = document.createElement('div');
  f2.className = 'nes-field';
  const notesLabel = document.createElement('label');
  notesLabel.textContent = 'Notes (optional)';
  const notesInput = document.createElement('textarea');
  notesInput.className = 'nes-textarea';
  notesInput.maxLength = 500;
  notesInput.value = g.notes || '';
  f2.appendChild(notesLabel);
  f2.appendChild(notesInput);

  const row = document.createElement('div');
  row.className = 'edit-row';
  const saveBtn = document.createElement('button');
  saveBtn.type = 'button';
  saveBtn.className = 'nes-btn is-success save-btn';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => saveEdit(g.id, titleInput.value, notesInput.value));
  const cancelBtn = document.createElement('button');
  cancelBtn.type = 'button';
  cancelBtn.className = 'nes-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => { editingId = null; render(); });
  row.appendChild(saveBtn);
  row.appendChild(cancelBtn);

  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.className = 'nes-btn is-error delete-btn';
  delBtn.textContent = 'Delete forever';
  let armed = false;
  delBtn.addEventListener('click', () => {
    if (!armed) {
      armed = true;
      delBtn.textContent = 'Tap again to delete';
      return;
    }
    deleteGripe(g.id);
  });

  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveEdit(g.id, titleInput.value, notesInput.value); }
    if (e.key === 'Escape') { editingId = null; render(); }
  });

  form.appendChild(f1);
  form.appendChild(f2);
  form.appendChild(row);
  form.appendChild(delBtn);

  setTimeout(() => titleInput.focus(), 0);
  return form;
}

function saveEdit(id, title, notes) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  const t = title.trim();
  if (!t) return;
  g.title = t;
  g.notes = notes.trim();
  editingId = null;
  save();
  render();
}

function deleteGripe(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  state.gripes.splice(idx, 1);
  editingId = null;
  save();
  render();
}

function renderArchive() {
  const arch = state.archive;
  archiveToggle.textContent = arch.length
    ? (archiveEl.classList.contains('open') ? '- hide done (' + arch.length + ')' : '+ show done (' + arch.length + ')')
    : '';
  archiveToggle.style.display = arch.length ? 'inline-block' : 'none';

  archiveEl.innerHTML = '';
  for (const g of [...arch].reverse()) {
    const row = document.createElement('div');
    row.className = 'arch-item';

    const left = document.createElement('div');
    const t = document.createElement('div');
    t.className = 'arch-title';
    t.textContent = g.title;
    const d = document.createElement('div');
    d.className = 'arch-date';
    d.textContent = 'done ' + fmtDate(g.doneAt);
    left.appendChild(t);
    left.appendChild(d);

    const restore = document.createElement('button');
    restore.type = 'button';
    restore.className = 'nes-btn is-warning restore-btn';
    restore.textContent = 'restore';
    restore.addEventListener('click', () => restoreGripe(g.id));

    row.appendChild(left);
    row.appendChild(restore);
    archiveEl.appendChild(row);
  }
}

function bump(id, card) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  g.taps.push(Date.now());
  save();
  if (card) {
    card.style.transform = 'scale(1.02)';
    setTimeout(() => { card.style.transform = ''; }, 130);
  }
  // small delay so the bump is visible before re-sort jumps it
  setTimeout(render, 260);
}

function addGripe() {
  const titleEl = document.getElementById('title');
  const notesEl = document.getElementById('notes');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }
  const now = Date.now();
  state.gripes.push({ id: uid(), title, notes: notesEl.value.trim(), created: now, taps: [now] });
  save();
  titleEl.value = '';
  notesEl.value = '';
  titleEl.focus();
  render();
}

function finish(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.gripes.splice(idx, 1);
  g.doneAt = Date.now();
  state.archive.push(g);
  save();
  render();
  celebrate(g.title);
}

function restoreGripe(id) {
  const idx = state.archive.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.archive.splice(idx, 1);
  delete g.doneAt;
  g.taps.push(Date.now());
  state.gripes.push(g);
  save();
  render();
}

document.getElementById('add-btn').addEventListener('click', addGripe);
document.getElementById('title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); addGripe(); }
});
archiveToggle.addEventListener('click', () => {
  archiveEl.classList.toggle('open');
  renderArchive();
});

/* ── Celebration: confetti + giant DONE! ── */
const celebrateEl = document.getElementById('celebrate');
const celebrateSub = document.getElementById('celebrate-sub');
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
const COLORS = ['#92cc41', '#f7d51d', '#209cee', '#e76e55', '#ffffff', '#2b2b2b'];
let pieces = [];
let rafId = null;

function sizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', sizeCanvas);

function celebrate(title) {
  celebrateSub.textContent = '"' + title + '" is handled';
  celebrateEl.classList.add('show');
  sizeCanvas();
  canvas.style.display = 'block';

  pieces = [];
  const n = 200;
  for (let i = 0; i < n; i++) {
    pieces.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 120,
      y: canvas.height / 2 + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 18,
      vy: (Math.random() - 0.9) * 20,
      size: 8 + Math.random() * 8,
      color: COLORS[(Math.random() * COLORS.length) | 0],
      vr: (Math.random() - 0.5) * 0.3,
      rot: 0,
      life: 0
    });
  }

  if (rafId) cancelAnimationFrame(rafId);
  animate();

  setTimeout(() => {
    celebrateEl.classList.remove('show');
  }, 2200);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of pieces) {
    p.life++;
    p.vy += 0.6;          // gravity
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    const alpha = Math.max(0, 1 - p.life / 130);
    if (alpha > 0 && p.y < canvas.height + 40) alive = true;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    // chunky pixel squares, snapped to a grid for an 8-bit feel
    const px = Math.round(p.x / 4) * 4;
    const py = Math.round(p.y / 4) * 4;
    ctx.fillRect(px, py, p.size, p.size);
  }
  if (alive) {
    rafId = requestAnimationFrame(animate);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    rafId = null;
  }
}

render();
</script>
</body>
</html>
