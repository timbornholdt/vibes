<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#5C3F28">
<title>Stuff That Sucks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --paper:      #F3E9D6;
    --paper-edge: #E2D2B4;
    --card:       #FBF5E7;
    --ink:        #352A1E;
    --ink-soft:   #6F6151;
    --sage:       #7E9070;
    --sage-deep:  #566B4C;
    --forest:     #3B5140;
    --olive:      #9A9450;
    --gold:       #C0902E;
    --gold-soft:  #D8B45D;
    --walnut:     #5C3F28;
    --walnut-soft:#7A5436;
    --taupe:      #C8B79A;
    --rust:       #A8492E;
    --shadow:     0 2px 6px rgba(70, 46, 20, 0.14);
    --shadow-lg:  0 8px 24px rgba(70, 46, 20, 0.18);
    --r: 12px;
    --sans:  'Futura', 'Century Gothic', 'Avenir Next', 'Trebuchet MS', system-ui, sans-serif;
    --serif: 'Palatino Linotype', Palatino, 'Iowan Old Style', 'Hoefler Text', Georgia, serif;
  }

  body {
    font-family: var(--sans);
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 50% -5%, rgba(126, 144, 112, 0.12), transparent 55%),
      repeating-linear-gradient(90deg, rgba(92, 63, 40, 0.025) 0 1px, transparent 1px 14px);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 600px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* ── Masthead (teak nameplate) ── */
  .masthead {
    position: relative;
    background-color: var(--walnut);
    background-image:
      repeating-linear-gradient(90deg, rgba(255, 248, 235, 0.04) 0 2px, transparent 2px 7px),
      repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.06) 0 1px, transparent 1px 11px),
      linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.12));
    border-radius: var(--r);
    padding: 30px 26px 26px;
    box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .sprig {
    position: absolute;
    top: 16px;
    right: 18px;
    width: 78px;
    height: 78px;
  }
  .sprig .stem { stroke: var(--sage-deep); stroke-width: 3; fill: none; stroke-linecap: round; }
  .sprig .leaf { fill: var(--sage); }

  h1 {
    font-family: var(--serif);
    font-size: 52px;
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.5px;
    color: #F4EAD6;
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    margin-bottom: 12px;
  }
  h1 span { color: var(--gold-soft); }

  .site-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-soft);
  }

  .rule {
    width: 48px;
    height: 3px;
    background: var(--gold);
    border-radius: 3px;
    margin: 0 0 24px;
  }

  /* ── Add form ── */
  .add {
    background: var(--card);
    border: 1px solid var(--paper-edge);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: var(--shadow);
  }

  .add label,
  .gripe-edit label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--sage-deep);
    margin-bottom: 7px;
  }

  .add input,
  .add textarea,
  .gripe-edit input,
  .gripe-edit textarea {
    width: 100%;
    font-family: var(--sans);
    font-size: 16px;
    color: var(--ink);
    background: #FFFDF6;
    border: 1.5px solid #D8C7A6;
    border-radius: 8px;
    padding: 11px 13px;
    margin-bottom: 14px;
  }

  .add input:focus,
  .add textarea:focus,
  .gripe-edit input:focus,
  .gripe-edit textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(192, 144, 46, 0.18);
  }

  .add textarea,
  .gripe-edit textarea { resize: vertical; min-height: 54px; }

  .add button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #F4EAD6;
    background: var(--forest);
    border: none;
    border-radius: 8px;
    padding: 13px 18px;
    width: 100%;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: background 0.15s, transform 0.08s;
  }

  .add button:hover { background: #46624c; }
  .add button:active { transform: translateY(1px); }

  /* ── Section label ── */
  .section-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  /* ── List ── */
  .items { display: flex; flex-direction: column; gap: 14px; }

  .empty {
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.7;
    padding: 6px 2px 22px;
  }

  .gripe {
    position: relative;
    background: var(--card);
    border: 1px solid var(--paper-edge);
    border-left: 5px solid var(--sage);
    border-radius: var(--r);
    padding: 18px 18px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: var(--shadow);
    transition: transform 0.1s, box-shadow 0.15s, border-color 0.2s;
  }

  .gripe:hover { box-shadow: var(--shadow-lg); }

  /* priority accent — gold for the worst, fading to taupe */
  .items .gripe:nth-child(1) { border-left-color: var(--gold); }
  .items .gripe:nth-child(2) { border-left-color: var(--olive); }
  .items .gripe:nth-child(3) { border-left-color: var(--sage); }
  .items .gripe:nth-child(n+4) { border-left-color: var(--taupe); }

  .gripe:active { transform: translateY(1px); }
  .gripe.bumped { animation: bump 0.45s ease; }

  @keyframes bump {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.025); box-shadow: var(--shadow-lg); }
    100% { transform: scale(1); }
  }

  .gripe-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .gripe-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
    word-break: break-word;
  }

  .gripe-notes {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-top: 7px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .gripe-meta {
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--ink-soft);
    margin-top: 11px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
  }

  .gripe-meta b { color: var(--gold); font-weight: 700; }

  .hint {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--sage);
    margin-top: 9px;
  }

  /* ── Icon buttons ── */
  .gripe-actions {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .edit-btn,
  .done-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-family: var(--sans);
    line-height: 1;
    background: #FFFDF6;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.08s;
  }

  .edit-btn { border: 1.5px solid var(--gold); color: var(--gold); font-size: 16px; }
  .edit-btn:hover { background: var(--gold); color: #FFFDF6; }

  .done-btn { border: 1.5px solid var(--sage-deep); color: var(--sage-deep); font-size: 18px; }
  .done-btn:hover { background: var(--forest); color: #F4EAD6; border-color: var(--forest); }

  .edit-btn:active,
  .done-btn:active { transform: scale(0.9); }

  /* ── Inline edit form ── */
  .gripe.editing {
    cursor: default;
    border-left-color: var(--gold);
    box-shadow: var(--shadow-lg);
  }

  .edit-row { display: flex; gap: 8px; }

  .edit-row button {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    padding: 11px 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s;
  }

  .edit-row button:active { transform: translateY(1px); }

  .save-btn { background: var(--forest); color: #F4EAD6; flex: 1; }
  .save-btn:hover { background: #46624c; }
  .cancel-btn { background: #E7DAC0; color: var(--ink); }
  .cancel-btn:hover { background: #dccba9; }

  .delete-btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #FBEDE7;
    color: var(--rust);
    border: 1.5px solid var(--rust);
    border-radius: 8px;
    margin-top: 14px;
    width: 100%;
    padding: 11px 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .delete-btn.armed { background: var(--rust); color: #FBF5E7; animation: nudge 0.3s; }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* ── Archive ── */
  .archive-toggle {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    background: none;
    color: var(--sage-deep);
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 36px;
  }

  .archive-toggle:hover { color: var(--forest); }

  .archive { margin-top: 16px; display: none; }
  .archive.open { display: block; }

  .arch-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: #EEE3CC;
    border: 1px solid var(--paper-edge);
    border-radius: 8px;
    padding: 11px 14px;
    margin-bottom: 9px;
  }

  .arch-title {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-soft);
    text-decoration: line-through;
    word-break: break-word;
  }

  .arch-date { font-size: 10px; color: #9c8c75; margin-top: 3px; letter-spacing: 0.5px; }

  .restore-btn {
    flex-shrink: 0;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    background: #FFFDF6;
    color: var(--gold);
    border: 1.5px solid var(--gold);
    border-radius: 7px;
    padding: 7px 10px;
    cursor: pointer;
  }

  .restore-btn:hover { background: var(--gold); color: #FFFDF6; }

  /* ── Celebration ── */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    display: none;
  }

  #celebrate {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    pointer-events: none;
  }

  #celebrate.show { display: flex; }

  .celebrate-word {
    font-family: var(--serif);
    font-size: 17vw;
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--forest);
    text-shadow: 0 2px 0 var(--gold-soft), 0 6px 22px rgba(59, 81, 64, 0.4);
    text-align: center;
    line-height: 0.9;
    animation: popUp 0.5s cubic-bezier(.18, 1.5, .4, 1);
  }

  .celebrate-sub {
    font-family: var(--sans);
    margin-top: 16px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--gold);
    color: var(--walnut);
    padding: 9px 16px;
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    max-width: 90vw;
    word-break: break-word;
    animation: popUp 0.5s 0.1s backwards cubic-bezier(.18, 1.5, .4, 1);
  }

  @keyframes popUp {
    0%   { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  footer {
    margin-top: 52px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.5px;
  }

  footer a { color: var(--forest); text-decoration: underline; text-underline-offset: 2px; }
  footer a:hover { color: var(--gold); }

  @media (max-width: 440px) {
    .page { padding: 24px 16px 60px; }
    h1 { font-size: 40px; }
    .sprig { width: 62px; height: 62px; }
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="celebrate">
  <div class="celebrate-word">DONE!</div>
  <div class="celebrate-sub" id="celebrate-sub"></div>
</div>

<div class="page">

  <header class="masthead">
    <svg class="sprig" viewBox="0 0 100 100" aria-hidden="true">
      <path class="stem" d="M50 96 C49 74 50 52 50 30"/>
      <path class="leaf" d="M50 70 C36 66 24 52 18 32 C40 34 52 50 50 70 Z"/>
      <path class="leaf" d="M50 56 C66 52 78 38 84 18 C60 20 48 38 50 56 Z"/>
      <path class="leaf" d="M50 42 C42 30 44 14 52 4 C62 16 60 32 50 42 Z"/>
    </svg>
    <h1>Stuff That<br>Sucks<span>.</span></h1>
    <div class="site-sub">a considered list of domestic grievances</div>
  </header>

  <div class="rule"></div>

  <div class="add">
    <label for="title">What's bugging you?</label>
    <input id="title" type="text" placeholder="e.g. corner cabinet is impossible to organize" maxlength="120" autocomplete="off">
    <label for="notes">Notes (optional)</label>
    <textarea id="notes" placeholder="ideas, context, what you've tried..."></textarea>
    <button id="add-btn">Add to the list</button>
  </div>

  <div class="section-label">
    <span>In order of insistence</span>
    <span id="count"></span>
  </div>

  <div class="items" id="items"></div>
  <div class="empty" id="empty">
    Nothing here yet &mdash; add the first thing that nags you above.<br><br>
    Tap a card each time the annoyance strikes in real life; the more
    recently &amp; often it bugs you, the higher it rises.
  </div>

  <button class="archive-toggle" id="archive-toggle"></button>
  <div class="archive" id="archive"></div>

  <footer>
    <a href="https://github.com/timbornholdt/junk/blob/main/house-gripes.html">view source</a>
  </footer>

</div>

<script type="module">
const KEY = 'house-gripes-v1';
const HALF_LIFE_DAYS = 10;
const DAY = 86400000;

let state = load();
let editingId = null;

function load() {
  try {
    const raw = JSON.parse(localStorage.getItem(KEY));
    if (raw && Array.isArray(raw.gripes)) return raw;
  } catch (e) {}
  return { gripes: [], archive: [] };
}

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// Recency-weighted priority: every encounter (tap) decays with a 10-day
// half-life, so a thing that bugged you yesterday outranks one you hammered
// months ago but stopped caring about.
function score(g, now) {
  return g.taps.reduce((sum, t) => sum + Math.pow(0.5, (now - t) / DAY / HALF_LIFE_DAYS), 0);
}

function relTime(ms) {
  const diff = Date.now() - ms;
  if (diff < 60000) return 'just now';
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  const months = Math.floor(days / 30);
  if (months < 12) return months + 'mo ago';
  return Math.floor(months / 12) + 'y ago';
}

function fmtDate(ms) {
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const d = new Date(ms);
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

const itemsEl = document.getElementById('items');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const archiveEl = document.getElementById('archive');
const archiveToggle = document.getElementById('archive-toggle');

function render() {
  const now = Date.now();
  const sorted = [...state.gripes].sort((a, b) => score(b, now) - score(a, now));

  itemsEl.innerHTML = '';
  emptyEl.style.display = sorted.length ? 'none' : 'block';
  countEl.textContent = sorted.length ? sorted.length + ' open' : '';

  for (const g of sorted) {
    const card = document.createElement('div');
    card.className = 'gripe';
    card.dataset.id = g.id;

    if (g.id === editingId) {
      card.classList.add('editing');
      card.appendChild(buildEditForm(g));
      itemsEl.appendChild(card);
      continue;
    }

    const top = document.createElement('div');
    top.className = 'gripe-top';

    const titleWrap = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'gripe-title';
    title.textContent = g.title;
    titleWrap.appendChild(title);

    if (g.notes) {
      const notes = document.createElement('div');
      notes.className = 'gripe-notes';
      notes.textContent = g.notes;
      titleWrap.appendChild(notes);
    }

    const meta = document.createElement('div');
    meta.className = 'gripe-meta';
    const hits = g.taps.length;
    meta.innerHTML =
      'bugged you <b>' + hits + '×</b>' +
      '<span>last: ' + relTime(g.taps[g.taps.length - 1]) + '</span>' +
      '<span>added ' + fmtDate(g.created) + '</span>';
    titleWrap.appendChild(meta);

    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'tap when it nags you again ↑ rises to the top';
    titleWrap.appendChild(hint);

    top.appendChild(titleWrap);

    const actions = document.createElement('div');
    actions.className = 'gripe-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.title = 'Edit';
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', (e) => { e.stopPropagation(); editingId = g.id; render(); });

    const doneBtn = document.createElement('button');
    doneBtn.className = 'done-btn';
    doneBtn.title = 'Mark done';
    doneBtn.textContent = '✓';
    doneBtn.addEventListener('click', (e) => { e.stopPropagation(); finish(g.id); });

    actions.appendChild(editBtn);
    actions.appendChild(doneBtn);
    top.appendChild(actions);

    card.appendChild(top);
    card.addEventListener('click', () => bump(g.id, card));
    itemsEl.appendChild(card);
  }

  renderArchive();
}

function buildEditForm(g) {
  const form = document.createElement('div');
  form.className = 'gripe-edit';

  const titleLabel = document.createElement('label');
  titleLabel.textContent = "What's bugging you?";
  const titleInput = document.createElement('input');
  titleInput.type = 'text';
  titleInput.maxLength = 120;
  titleInput.value = g.title;

  const notesLabel = document.createElement('label');
  notesLabel.textContent = 'Notes (optional)';
  const notesInput = document.createElement('textarea');
  notesInput.maxLength = 500;
  notesInput.value = g.notes || '';

  const row = document.createElement('div');
  row.className = 'edit-row';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'save-btn';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => saveEdit(g.id, titleInput.value, notesInput.value));
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => { editingId = null; render(); });
  row.appendChild(saveBtn);
  row.appendChild(cancelBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = 'Delete forever';
  let armed = false;
  delBtn.addEventListener('click', () => {
    if (!armed) {
      armed = true;
      delBtn.classList.add('armed');
      delBtn.textContent = 'Tap again to delete';
      return;
    }
    deleteGripe(g.id);
  });

  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveEdit(g.id, titleInput.value, notesInput.value); }
    if (e.key === 'Escape') { editingId = null; render(); }
  });

  form.appendChild(titleLabel);
  form.appendChild(titleInput);
  form.appendChild(notesLabel);
  form.appendChild(notesInput);
  form.appendChild(row);
  form.appendChild(delBtn);

  setTimeout(() => titleInput.focus(), 0);
  return form;
}

function saveEdit(id, title, notes) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  const t = title.trim();
  if (!t) return;
  g.title = t;
  g.notes = notes.trim();
  editingId = null;
  save();
  render();
}

function deleteGripe(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  state.gripes.splice(idx, 1);
  editingId = null;
  save();
  render();
}

function renderArchive() {
  const arch = state.archive;
  archiveToggle.textContent = arch.length
    ? (archiveEl.classList.contains('open') ? '▾ hide done (' + arch.length + ')' : '▸ show done (' + arch.length + ')')
    : '';
  archiveToggle.style.display = arch.length ? 'inline-block' : 'none';

  archiveEl.innerHTML = '';
  for (const g of [...arch].reverse()) {
    const row = document.createElement('div');
    row.className = 'arch-item';

    const left = document.createElement('div');
    const t = document.createElement('div');
    t.className = 'arch-title';
    t.textContent = g.title;
    const d = document.createElement('div');
    d.className = 'arch-date';
    d.textContent = 'done ' + fmtDate(g.doneAt);
    left.appendChild(t);
    left.appendChild(d);

    const restore = document.createElement('button');
    restore.className = 'restore-btn';
    restore.textContent = 'restore';
    restore.addEventListener('click', () => restoreGripe(g.id));

    row.appendChild(left);
    row.appendChild(restore);
    archiveEl.appendChild(row);
  }
}

function bump(id, card) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  g.taps.push(Date.now());
  save();
  if (card) {
    card.classList.remove('bumped');
    void card.offsetWidth;
    card.classList.add('bumped');
  }
  // small delay so the bump animation is visible before re-sort jumps it
  setTimeout(render, 260);
}

function addGripe() {
  const titleEl = document.getElementById('title');
  const notesEl = document.getElementById('notes');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }
  const now = Date.now();
  state.gripes.push({ id: uid(), title, notes: notesEl.value.trim(), created: now, taps: [now] });
  save();
  titleEl.value = '';
  notesEl.value = '';
  titleEl.focus();
  render();
}

function finish(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.gripes.splice(idx, 1);
  g.doneAt = Date.now();
  state.archive.push(g);
  save();
  render();
  celebrate(g.title);
}

function restoreGripe(id) {
  const idx = state.archive.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.archive.splice(idx, 1);
  delete g.doneAt;
  g.taps.push(Date.now());
  state.gripes.push(g);
  save();
  render();
}

document.getElementById('add-btn').addEventListener('click', addGripe);
document.getElementById('title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); addGripe(); }
});
archiveToggle.addEventListener('click', () => {
  archiveEl.classList.toggle('open');
  renderArchive();
});

/* ── Celebration: confetti + giant DONE! ── */
const celebrateEl = document.getElementById('celebrate');
const celebrateSub = document.getElementById('celebrate-sub');
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
const COLORS = ['#C0902E', '#D8B45D', '#7E9070', '#3B5140', '#7A5436', '#F4EAD6'];
let pieces = [];
let rafId = null;

function sizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', sizeCanvas);

function celebrate(title) {
  celebrateSub.textContent = '"' + title + '" is handled';
  celebrateEl.classList.add('show');
  sizeCanvas();
  canvas.style.display = 'block';

  pieces = [];
  const n = 220;
  for (let i = 0; i < n; i++) {
    pieces.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 120,
      y: canvas.height / 2 + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 18,
      vy: (Math.random() - 0.9) * 20,
      size: 5 + Math.random() * 9,
      color: COLORS[(Math.random() * COLORS.length) | 0],
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.4,
      life: 0
    });
  }

  if (rafId) cancelAnimationFrame(rafId);
  animate();

  setTimeout(() => {
    celebrateEl.classList.remove('show');
  }, 2200);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of pieces) {
    p.life++;
    p.vy += 0.6;          // gravity
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    const alpha = Math.max(0, 1 - p.life / 130);
    if (alpha > 0 && p.y < canvas.height + 40) alive = true;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    ctx.restore();
  }
  if (alive) {
    rafId = requestAnimationFrame(animate);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    rafId = null;
  }
}

render();
</script>
