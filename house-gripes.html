<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0A0A0A">
<title>Stuff That Sucks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --yellow: #FFE600;
    --pink:   #FF2D78;
    --green:  #39FF14;
  }

  body {
    font-family: 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', ui-monospace, monospace;
    background-color: #000;
    background-image: radial-gradient(circle, #0d3d06 1.5px, transparent 1.5px);
    background-size: 5px 5px;
    min-height: 100vh;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 620px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  header { margin-bottom: 24px; }

  h1 {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--yellow);
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    line-height: 0.9;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  h1 span { color: var(--pink); }

  .site-sub {
    font-size: 11px;
    background: #000;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: inline-block;
    padding: 3px 8px;
  }

  .rule {
    border-top: 4px solid var(--pink);
    margin: 16px 0;
    overflow: hidden;
    font-size: 0;
    height: 0;
  }

  /* ── Add form ── */
  .add {
    background: #000;
    border-left: 6px solid var(--yellow);
    border-bottom: 4px solid var(--yellow);
    padding: 16px;
    margin-bottom: 28px;
  }

  .add label {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 6px;
  }

  .add input,
  .add textarea {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    background: #111;
    color: #fff;
    border: 2px solid #333;
    padding: 10px 12px;
    margin-bottom: 12px;
  }

  .add input:focus,
  .add textarea:focus {
    outline: none;
    border-color: var(--yellow);
  }

  .add textarea { resize: vertical; min-height: 52px; }

  .add button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--green);
    color: #000;
    border: none;
    padding: 12px 18px;
    cursor: pointer;
    width: 100%;
    border-bottom: 4px solid #1f8c0a;
    transition: transform 0.08s;
  }

  .add button:active { transform: translateY(2px); border-bottom-width: 2px; }

  /* ── Section labels ── */
  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #777;
    margin: 0 0 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  /* ── List ── */
  .items { display: flex; flex-direction: column; gap: 12px; }

  .empty {
    color: #555;
    font-size: 13px;
    line-height: 1.7;
    padding: 8px 0 24px;
  }

  .gripe {
    position: relative;
    background: #000;
    border-left: 6px solid var(--green);
    border-bottom: 4px solid var(--green);
    padding: 16px 16px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s, border-color 0.2s;
  }

  /* top 3 priorities get the loud colors */
  .items .gripe:nth-child(1) { border-left-color: var(--pink);   border-bottom-color: var(--pink); }
  .items .gripe:nth-child(2) { border-left-color: var(--yellow); border-bottom-color: var(--yellow); }
  .items .gripe:nth-child(3) { border-left-color: var(--green);  border-bottom-color: var(--green); }
  .items .gripe:nth-child(n+4) { border-left-color: #444; border-bottom-color: #444; }

  .gripe:active { transform: translate(-2px, -2px); }
  .gripe.bumped { animation: bump 0.4s ease; }

  @keyframes bump {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.04) translate(-3px, -3px); box-shadow: 6px 6px 0 var(--pink); }
    100% { transform: scale(1); }
  }

  .gripe-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .gripe-title {
    font-size: 19px;
    font-weight: 900;
    letter-spacing: -0.3px;
    line-height: 1.2;
    text-transform: uppercase;
    color: #fff;
    word-break: break-word;
  }

  .gripe-notes {
    font-size: 13px;
    line-height: 1.55;
    color: #aaa;
    margin-top: 7px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .gripe-meta {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: #666;
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
  }

  .gripe-meta b { color: var(--yellow); font-weight: 700; }

  .hint {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #444;
    margin-top: 8px;
  }

  /* done button */
  .done-btn {
    flex-shrink: 0;
    font-family: inherit;
    font-size: 18px;
    line-height: 1;
    background: #111;
    color: var(--green);
    border: 2px solid #333;
    width: 38px;
    height: 38px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, transform 0.08s;
  }

  .done-btn:hover { background: var(--green); color: #000; border-color: var(--green); }
  .done-btn:active { transform: scale(0.9); }

  .gripe-actions {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .edit-btn {
    font-family: inherit;
    font-size: 15px;
    line-height: 1;
    background: #111;
    color: var(--yellow);
    border: 2px solid #333;
    width: 38px;
    height: 38px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, transform 0.08s;
  }

  .edit-btn:hover { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .edit-btn:active { transform: scale(0.9); }

  /* ── Inline edit form ── */
  .gripe.editing { cursor: default; border-left-color: var(--yellow) !important; border-bottom-color: var(--yellow) !important; }

  .gripe-edit label {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 6px;
  }

  .gripe-edit input,
  .gripe-edit textarea {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    background: #111;
    color: #fff;
    border: 2px solid #333;
    padding: 10px 12px;
    margin-bottom: 12px;
  }

  .gripe-edit input:focus,
  .gripe-edit textarea:focus { outline: none; border-color: var(--yellow); }

  .gripe-edit textarea { resize: vertical; min-height: 52px; }

  .edit-row { display: flex; gap: 8px; }

  .edit-row button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    transition: transform 0.08s;
  }

  .edit-row button:active { transform: translateY(2px); }

  .save-btn { background: var(--green); color: #000; border-bottom: 4px solid #1f8c0a; flex: 1; }
  .cancel-btn { background: #222; color: #ccc; border-bottom: 4px solid #000; }

  .delete-btn {
    background: #2a0a12;
    color: var(--pink);
    border: 2px solid var(--pink) !important;
    margin-top: 12px;
    width: 100%;
  }

  .delete-btn.armed { background: var(--pink); color: #000; animation: nudge 0.3s; }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* ── Archive ── */
  .archive-toggle {
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    color: #777;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 36px;
  }

  .archive-toggle:hover { color: var(--green); }

  .archive { margin-top: 14px; display: none; }
  .archive.open { display: block; }

  .arch-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: #080808;
    border-left: 4px solid #2a2a2a;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .arch-title {
    font-size: 13px;
    color: #888;
    text-decoration: line-through;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    word-break: break-word;
  }

  .arch-date { font-size: 9px; color: #555; margin-top: 3px; letter-spacing: 0.5px; }

  .restore-btn {
    flex-shrink: 0;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #111;
    color: var(--yellow);
    border: 2px solid #333;
    padding: 6px 8px;
    cursor: pointer;
  }

  .restore-btn:hover { background: var(--yellow); color: #000; border-color: var(--yellow); }

  /* ── Celebration ── */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    display: none;
  }

  #celebrate {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    pointer-events: none;
  }

  #celebrate.show { display: flex; }

  .celebrate-word {
    font-size: 19vw;
    font-weight: 900;
    letter-spacing: -4px;
    color: var(--green);
    -webkit-text-stroke: 4px #000;
    paint-order: stroke fill;
    text-transform: uppercase;
    text-align: center;
    line-height: 0.85;
    animation: pop 0.5s cubic-bezier(.18,1.5,.4,1);
  }

  .celebrate-sub {
    margin-top: 14px;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--pink);
    color: #000;
    padding: 8px 16px;
    text-align: center;
    animation: pop 0.5s 0.1s backwards cubic-bezier(.18,1.5,.4,1);
    max-width: 90vw;
    word-break: break-word;
  }

  @keyframes pop {
    0%   { transform: scale(0) rotate(-8deg); opacity: 0; }
    100% { transform: scale(1) rotate(-3deg); opacity: 1; }
  }

  footer {
    margin-top: 48px;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.5px;
  }

  footer a { color: var(--green); }

  @media (max-width: 440px) {
    .page { padding: 32px 16px 60px; }
    h1 { font-size: 42px; -webkit-text-stroke: 2px #000; }
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="celebrate">
  <div class="celebrate-word">DONE!</div>
  <div class="celebrate-sub" id="celebrate-sub"></div>
</div>

<div class="page">

  <header>
    <h1>Stuff That<br>Sucks<span>.</span></h1>
    <div class="site-sub">household nag list</div>
  </header>

  <div class="rule"></div>

  <div class="add">
    <label for="title">What's bugging you?</label>
    <input id="title" type="text" placeholder="e.g. corner cabinet is impossible to organize" maxlength="120" autocomplete="off">
    <label for="notes">Notes (optional)</label>
    <textarea id="notes" placeholder="ideas, context, what you've tried..." maxlength="500"></textarea>
    <button id="add-btn">Add to the list</button>
  </div>

  <div class="section-label">
    <span>The list -- worst first</span>
    <span id="count"></span>
  </div>

  <div class="items" id="items"></div>
  <div class="empty" id="empty">
    Nothing here yet. Add the first thing that bugs you above.<br><br>
    Tap a card every time the annoyance hits you in real life -- the more
    recently &amp; often it bugs you, the higher it climbs.
  </div>

  <button class="archive-toggle" id="archive-toggle"></button>
  <div class="archive" id="archive"></div>

  <footer>
    <a href="https://github.com/timbornholdt/junk/blob/main/house-gripes.html">view source</a>
  </footer>

</div>

<script>
/* vibes-sync: shared token gate + JSON sync for gated tools.
   The same block is inlined into each gated tool (files must be self-contained). */
window.VibesSync = (function () {
  const TOKEN_KEY = 'vibes-token';
  const BASE = '/api/store/';
  let token = localStorage.getItem(TOKEN_KEY) || '';
  let gateEl, gateInput, gateErr, resolver;

  function injectStyle() {
    if (document.getElementById('vibes-gate-style')) return;
    const s = document.createElement('style');
    s.id = 'vibes-gate-style';
    s.textContent =
      '.vibes-gate{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:center;' +
      'justify-content:center;background:#0a0a0a;padding:24px;' +
      "font-family:'JetBrains Mono','Fira Mono',ui-monospace,monospace;}" +
      '.vibes-gate-box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}' +
      '.vibes-gate-title{color:#FFE600;font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:-1px;}' +
      '.vibes-gate-sub{color:#888;font-size:12px;line-height:1.5;}' +
      '.vibes-gate-input{font-size:16px;padding:12px;background:#161616;border:1px solid #2a2a2a;color:#ececec;border-radius:6px;width:100%;}' +
      '.vibes-gate-input:focus{outline:none;border-color:#FF2D78;}' +
      '.vibes-gate-btn{font-size:16px;padding:12px;background:#FF2D78;color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;}' +
      '.vibes-gate-err{color:#FF2D78;font-size:12px;min-height:16px;}';
    document.head.appendChild(s);
  }

  function buildGate() {
    injectStyle();
    gateEl = document.createElement('div');
    gateEl.className = 'vibes-gate';
    const box = document.createElement('div');
    box.className = 'vibes-gate-box';
    box.innerHTML =
      '<div class="vibes-gate-title">Locked</div>' +
      '<div class="vibes-gate-sub">This one is private. Paste your access token to continue.</div>' +
      '<input class="vibes-gate-input" type="password" autocomplete="current-password" placeholder="access token">' +
      '<button class="vibes-gate-btn" type="button">Unlock</button>' +
      '<div class="vibes-gate-err"></div>';
    gateEl.appendChild(box);
    document.body.appendChild(gateEl);
    gateInput = box.querySelector('.vibes-gate-input');
    gateErr = box.querySelector('.vibes-gate-err');
    const btn = box.querySelector('.vibes-gate-btn');
    const submit = () => {
      const v = gateInput.value.trim();
      if (!v) { gateInput.focus(); return; }
      const r = resolver; resolver = null;
      if (r) r(v);
    };
    btn.addEventListener('click', submit);
    gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
  }

  function showGate(msg) {
    if (!gateEl) buildGate();
    gateEl.style.display = 'flex';
    gateErr.textContent = msg || '';
    gateInput.value = '';
    setTimeout(() => gateInput.focus(), 50);
    return new Promise(res => { resolver = res; });
  }
  function hideGate() { if (gateEl) gateEl.style.display = 'none'; }

  function headers(extra) {
    return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
  }

  async function remoteGet(key) {
    const res = await fetch(BASE + key, { headers: headers(), cache: 'no-store' });
    if (res.status === 401) { const e = new Error('unauthorized'); e.code = 401; throw e; }
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('GET ' + res.status);
    return res.json();
  }

  async function remotePut(key, payload) {
    const res = await fetch(BASE + key, {
      method: 'PUT',
      headers: headers({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(payload)
    });
    if (res.status === 401) { const e = new Error('unauthorized'); e.code = 401; throw e; }
    if (!res.ok) throw new Error('PUT ' + res.status);
    return res.json().catch(() => ({}));
  }

  function readCache(key) {
    try {
      const raw = localStorage.getItem(key);
      if (raw == null) return null;
      return { value: JSON.parse(raw), updatedAt: Number(localStorage.getItem(key + ':updatedAt')) || 0 };
    } catch (e) { return null; }
  }
  function writeCache(key, value, updatedAt) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      localStorage.setItem(key + ':updatedAt', String(updatedAt));
    } catch (e) {}
  }

  // Gate the page on <key>. Resolves to { value, updatedAt, offline }.
  // value is null when the server has nothing stored yet.
  async function unlock(key) {
    for (;;) {
      if (!token) token = await showGate();
      try {
        const remote = await remoteGet(key);
        localStorage.setItem(TOKEN_KEY, token);
        hideGate();
        if (remote) { writeCache(key, remote.value, remote.updatedAt); return { value: remote.value, updatedAt: remote.updatedAt, offline: false }; }
        return { value: null, updatedAt: 0, offline: false };
      } catch (e) {
        if (e.code === 401) { localStorage.removeItem(TOKEN_KEY); token = await showGate('That token did not work.'); continue; }
        const cached = readCache(key);
        if (token && cached) { hideGate(); return { value: cached.value, updatedAt: cached.updatedAt, offline: true }; }
        token = await showGate("Can't reach the server. Check your connection and try again.");
        continue;
      }
    }
  }

  // Cache locally + push to the server. Last-write-wins.
  async function save(key, value) {
    const updatedAt = Date.now();
    writeCache(key, value, updatedAt);
    try { await remotePut(key, { value: value, updatedAt: updatedAt }); return { synced: true }; }
    catch (e) { return { synced: false, error: e }; }
  }

  return { unlock: unlock, save: save };
})();
</script>

<script type="module">
const KEY = 'house-gripes-v1';
const HALF_LIFE_DAYS = 10;
const DAY = 86400000;

let state = { gripes: [], archive: [] };
let editingId = null;

function save() { VibesSync.save(KEY, state); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// Recency-weighted priority: every encounter (tap) decays with a 10-day
// half-life, so a thing that bugged you yesterday outranks one you hammered
// months ago but stopped caring about.
function score(g, now) {
  return g.taps.reduce((sum, t) => sum + Math.pow(0.5, (now - t) / DAY / HALF_LIFE_DAYS), 0);
}

function relTime(ms) {
  const diff = Date.now() - ms;
  if (diff < 60000) return 'just now';
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  const months = Math.floor(days / 30);
  if (months < 12) return months + 'mo ago';
  return Math.floor(months / 12) + 'y ago';
}

function fmtDate(ms) {
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const d = new Date(ms);
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

const itemsEl = document.getElementById('items');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const archiveEl = document.getElementById('archive');
const archiveToggle = document.getElementById('archive-toggle');

function render() {
  const now = Date.now();
  const sorted = [...state.gripes].sort((a, b) => score(b, now) - score(a, now));

  itemsEl.innerHTML = '';
  emptyEl.style.display = sorted.length ? 'none' : 'block';
  countEl.textContent = sorted.length ? sorted.length + ' open' : '';

  for (const g of sorted) {
    const card = document.createElement('div');
    card.className = 'gripe';
    card.dataset.id = g.id;

    if (g.id === editingId) {
      card.classList.add('editing');
      card.appendChild(buildEditForm(g));
      itemsEl.appendChild(card);
      continue;
    }

    const top = document.createElement('div');
    top.className = 'gripe-top';

    const titleWrap = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'gripe-title';
    title.textContent = g.title;
    titleWrap.appendChild(title);

    if (g.notes) {
      const notes = document.createElement('div');
      notes.className = 'gripe-notes';
      notes.textContent = g.notes;
      titleWrap.appendChild(notes);
    }

    const meta = document.createElement('div');
    meta.className = 'gripe-meta';
    const hits = g.taps.length;
    meta.innerHTML =
      'bugged you <b>' + hits + '×</b>' +
      '<span>last: ' + relTime(g.taps[g.taps.length - 1]) + '</span>' +
      '<span>added ' + fmtDate(g.created) + '</span>';
    titleWrap.appendChild(meta);

    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'tap card when it bugs you again → floats up';
    titleWrap.appendChild(hint);

    top.appendChild(titleWrap);

    const actions = document.createElement('div');
    actions.className = 'gripe-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.title = 'Edit';
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', (e) => { e.stopPropagation(); editingId = g.id; render(); });

    const doneBtn = document.createElement('button');
    doneBtn.className = 'done-btn';
    doneBtn.title = 'Mark done';
    doneBtn.textContent = '✓';
    doneBtn.addEventListener('click', (e) => { e.stopPropagation(); finish(g.id); });

    actions.appendChild(editBtn);
    actions.appendChild(doneBtn);
    top.appendChild(actions);

    card.appendChild(top);
    card.addEventListener('click', () => bump(g.id, card));
    itemsEl.appendChild(card);
  }

  renderArchive();
}

function buildEditForm(g) {
  const form = document.createElement('div');
  form.className = 'gripe-edit';

  const titleLabel = document.createElement('label');
  titleLabel.textContent = "What's bugging you?";
  const titleInput = document.createElement('input');
  titleInput.type = 'text';
  titleInput.maxLength = 120;
  titleInput.value = g.title;

  const notesLabel = document.createElement('label');
  notesLabel.textContent = 'Notes (optional)';
  const notesInput = document.createElement('textarea');
  notesInput.maxLength = 500;
  notesInput.value = g.notes || '';

  const row = document.createElement('div');
  row.className = 'edit-row';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'save-btn';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => saveEdit(g.id, titleInput.value, notesInput.value));
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => { editingId = null; render(); });
  row.appendChild(saveBtn);
  row.appendChild(cancelBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = 'Delete forever';
  let armed = false;
  delBtn.addEventListener('click', () => {
    if (!armed) {
      armed = true;
      delBtn.classList.add('armed');
      delBtn.textContent = 'Tap again to delete';
      return;
    }
    deleteGripe(g.id);
  });

  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveEdit(g.id, titleInput.value, notesInput.value); }
    if (e.key === 'Escape') { editingId = null; render(); }
  });

  form.appendChild(titleLabel);
  form.appendChild(titleInput);
  form.appendChild(notesLabel);
  form.appendChild(notesInput);
  form.appendChild(row);
  form.appendChild(delBtn);

  setTimeout(() => titleInput.focus(), 0);
  return form;
}

function saveEdit(id, title, notes) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  const t = title.trim();
  if (!t) return;
  g.title = t;
  g.notes = notes.trim();
  editingId = null;
  save();
  render();
}

function deleteGripe(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  state.gripes.splice(idx, 1);
  editingId = null;
  save();
  render();
}

function renderArchive() {
  const arch = state.archive;
  archiveToggle.textContent = arch.length
    ? (archiveEl.classList.contains('open') ? '▾ hide done (' + arch.length + ')' : '▸ show done (' + arch.length + ')')
    : '';
  archiveToggle.style.display = arch.length ? 'inline-block' : 'none';

  archiveEl.innerHTML = '';
  for (const g of [...arch].reverse()) {
    const row = document.createElement('div');
    row.className = 'arch-item';

    const left = document.createElement('div');
    const t = document.createElement('div');
    t.className = 'arch-title';
    t.textContent = g.title;
    const d = document.createElement('div');
    d.className = 'arch-date';
    d.textContent = 'done ' + fmtDate(g.doneAt);
    left.appendChild(t);
    left.appendChild(d);

    const restore = document.createElement('button');
    restore.className = 'restore-btn';
    restore.textContent = 'restore';
    restore.addEventListener('click', () => restoreGripe(g.id));

    row.appendChild(left);
    row.appendChild(restore);
    archiveEl.appendChild(row);
  }
}

function bump(id, card) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  g.taps.push(Date.now());
  save();
  if (card) {
    card.classList.remove('bumped');
    void card.offsetWidth;
    card.classList.add('bumped');
  }
  // small delay so the bump animation is visible before re-sort jumps it
  setTimeout(render, 260);
}

function addGripe() {
  const titleEl = document.getElementById('title');
  const notesEl = document.getElementById('notes');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }
  const now = Date.now();
  state.gripes.push({ id: uid(), title, notes: notesEl.value.trim(), created: now, taps: [now] });
  save();
  titleEl.value = '';
  notesEl.value = '';
  titleEl.focus();
  render();
}

function finish(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.gripes.splice(idx, 1);
  g.doneAt = Date.now();
  state.archive.push(g);
  save();
  render();
  celebrate(g.title);
}

function restoreGripe(id) {
  const idx = state.archive.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.archive.splice(idx, 1);
  delete g.doneAt;
  g.taps.push(Date.now());
  state.gripes.push(g);
  save();
  render();
}

document.getElementById('add-btn').addEventListener('click', addGripe);
document.getElementById('title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); addGripe(); }
});
archiveToggle.addEventListener('click', () => {
  archiveEl.classList.toggle('open');
  renderArchive();
});

/* ── Celebration: confetti + giant DONE! ── */
const celebrateEl = document.getElementById('celebrate');
const celebrateSub = document.getElementById('celebrate-sub');
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
const COLORS = ['#FFE600', '#FF2D78', '#39FF14', '#ffffff'];
let pieces = [];
let rafId = null;

function sizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', sizeCanvas);

function celebrate(title) {
  celebrateSub.textContent = '"' + title + '" is dead to you';
  celebrateEl.classList.add('show');
  sizeCanvas();
  canvas.style.display = 'block';

  pieces = [];
  const n = 220;
  for (let i = 0; i < n; i++) {
    pieces.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 120,
      y: canvas.height / 2 + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 18,
      vy: (Math.random() - 0.9) * 20,
      size: 5 + Math.random() * 9,
      color: COLORS[(Math.random() * COLORS.length) | 0],
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.4,
      life: 0
    });
  }

  if (rafId) cancelAnimationFrame(rafId);
  animate();

  setTimeout(() => {
    celebrateEl.classList.remove('show');
  }, 2200);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of pieces) {
    p.life++;
    p.vy += 0.6;          // gravity
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    const alpha = Math.max(0, 1 - p.life / 130);
    if (alpha > 0 && p.y < canvas.height + 40) alive = true;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    ctx.restore();
  }
  if (alive) {
    rafId = requestAnimationFrame(animate);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    rafId = null;
  }
}

(async function init() {
  const r = await VibesSync.unlock(KEY);
  if (r.value && Array.isArray(r.value.gripes)) state = r.value;
  render();
})();
</script>
