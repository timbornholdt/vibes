<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#5c94fc">
<title>Stuff That Sucks</title>
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    line-height: 1.8;
    background-color: #5c94fc;
    background-image:
      radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.32), transparent 45%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.10), transparent 30%);
    background-attachment: fixed;
    color: #212529;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 16px 80px;
  }

  .nes-container { background: #fff; }
  .items .nes-container { margin: 0; }

  /* ── Mario palette overrides ── */
  .nes-btn.is-error { background-color: #e52521; }
  .nes-btn.is-error::after { box-shadow: inset -4px -4px #a01000; }
  .nes-btn.is-error:hover::after { box-shadow: inset -6px -6px #a01000; }
  .nes-btn.is-error:active:not(.is-disabled)::after { box-shadow: inset 4px 4px #a01000; }
  .masthead { background-color: #e52521 !important; }

  /* ── Masthead ── */
  .masthead { margin-bottom: 28px; }

  .masthead h1 {
    font-size: 24px;
    line-height: 1.5;
    margin: 0 0 18px;
  }

  .masthead .dot { color: #f8b800; }

  .tagline { font-size: 10px; line-height: 1.9; color: #fff; margin: 0; }

  /* ── Add form ── */
  .add-form { margin-bottom: 30px; }
  .add-form .nes-field { margin-bottom: 18px; }

  .nes-input, .nes-textarea {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    line-height: 1.6;
  }

  .nes-textarea { min-height: 80px; resize: vertical; }

  label {
    display: block;
    font-size: 10px;
    line-height: 1.8;
    margin-bottom: 10px;
  }

  /* ── Section label ── */
  .section-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    font-size: 10px;
    line-height: 1.8;
    color: #fff;
    text-shadow: 2px 2px 0 #1b357e;
    margin: 0 0 16px;
  }

  /* ── List ── */
  .items { display: flex; flex-direction: column; gap: 20px; }

  .empty { font-size: 10px; line-height: 2; color: #fff; text-shadow: 2px 2px 0 #1b357e; padding: 4px 2px 20px; }

  .gripe { cursor: pointer; }

  .gripe-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }

  .rank { font-size: 9px; display: inline-block; margin: 0 0 10px; }
  .rank.r1 { color: #e52521; }
  .rank.r2 { color: #e59400; }
  .rank.r3 { color: #2a8a2a; }
  .rank.rn { color: #9a7a55; }

  .gripe-title { font-size: 13px; line-height: 1.6; color: #212529; margin: 0; word-break: break-word; }

  .gripe-notes {
    font-size: 10px;
    line-height: 1.8;
    color: #5a5a5a;
    margin: 12px 0 0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .gripe-meta {
    font-size: 8px;
    line-height: 1.9;
    color: #888;
    margin: 14px 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
  }

  .gripe-meta b { color: #c84c0c; }

  .hint { font-size: 8px; line-height: 1.8; color: #4a7a2a; margin: 12px 0 0; }

  /* ── Action buttons ── */
  .gripe-actions {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .gripe-actions .nes-btn { font-size: 9px; padding: 6px 8px; }

  /* ── Inline edit form ── */
  .gripe-edit { width: 100%; }
  .gripe-edit .nes-field { margin-bottom: 16px; }

  .edit-row { display: flex; gap: 10px; margin-top: 4px; }
  .edit-row .nes-btn { font-size: 10px; padding: 8px 10px; }
  .save-btn { flex: 1; }
  .delete-btn { width: 100%; margin-top: 14px; font-size: 10px; padding: 8px 10px; }

  /* ── Archive ── */
  .archive-toggle {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1.8;
    background: none;
    border: none;
    color: #fff;
    text-shadow: 2px 2px 0 #1b357e;
    cursor: pointer;
    padding: 0;
    margin-top: 32px;
  }

  .archive-toggle:hover { color: #f8b800; }

  .archive { margin-top: 18px; display: none; }
  .archive.open { display: block; }

  .arch-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 3px solid #212529;
    padding: 12px 14px;
    margin-bottom: 12px;
  }

  .arch-title { font-size: 10px; line-height: 1.7; color: #888; text-decoration: line-through; word-break: break-word; }
  .arch-date { font-size: 8px; line-height: 1.8; color: #aaa; margin-top: 6px; }
  .restore-btn { flex-shrink: 0; font-size: 9px; padding: 6px 8px; }

  /* ── Celebration ── */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    display: none;
  }

  #celebrate {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
    pointer-events: none;
  }

  #celebrate.show { display: flex; }

  .celebrate-word {
    font-family: 'Press Start 2P', monospace;
    font-size: 13vw;
    line-height: 1.3;
    color: #e52521;
    text-shadow: 5px 5px 0 #212529;
    text-align: center;
    animation: popUp 0.45s steps(5);
  }

  .celebrate-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    line-height: 1.7;
    margin-top: 26px;
    background: #f8b800;
    color: #212529;
    padding: 14px 18px;
    box-shadow: 6px 6px 0 #212529;
    text-align: center;
    max-width: 92vw;
    word-break: break-word;
    animation: popUp 0.45s 0.1s backwards steps(5);
  }

  @keyframes popUp {
    0%   { transform: scale(0.2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 440px) {
    .page { padding: 20px 12px 60px; }
    .masthead h1 { font-size: 18px; }
    .celebrate-word { font-size: 16vw; }
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="celebrate">
  <div class="celebrate-word">DONE!</div>
  <div class="celebrate-sub" id="celebrate-sub"></div>
</div>

<div class="page">

  <header class="masthead nes-container is-dark is-rounded">
    <h1>Stuff That<br>Sucks<span class="dot">.</span></h1>
    <p class="tagline">This shit sucks. Go fix it.</p>
  </header>

  <div class="add-form nes-container with-title is-rounded">
    <p class="title">Add a gripe</p>
    <div class="nes-field">
      <label for="title">What's bugging you?</label>
      <input id="title" class="nes-input" type="text" placeholder="corner cabinet is a mess" maxlength="120" autocomplete="off">
    </div>
    <div class="nes-field">
      <label for="notes">Notes (optional)</label>
      <textarea id="notes" class="nes-textarea" placeholder="ideas, context, what you've tried"></textarea>
    </div>
    <button id="add-btn" type="button" class="nes-btn is-success">Add to the list</button>
  </div>

  <div class="section-label">
    <span>In order of insistence</span>
    <span id="count"></span>
  </div>

  <div class="items" id="items"></div>
  <div class="empty" id="empty">
    Nothing here yet. Add the first thing that nags you above.<br><br>
    Tap a card each time the annoyance strikes in real life. The more
    recently &amp; often it bugs you, the higher it rises.
  </div>

  <button class="archive-toggle" id="archive-toggle"></button>
  <div class="archive" id="archive"></div>

</div>

<script>
/* vibes-sync: shared token gate + JSON sync for gated tools.
   The same block is inlined into each gated tool (files must be self-contained). */
window.VibesSync = (function () {
  const TOKEN_KEY = 'vibes-token';
  const BASE = '/api/store/';
  let token = localStorage.getItem(TOKEN_KEY) || '';
  let gateEl, gateInput, gateErr, resolver;

  function injectStyle() {
    if (document.getElementById('vibes-gate-style')) return;
    const s = document.createElement('style');
    s.id = 'vibes-gate-style';
    s.textContent =
      '.vibes-gate{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:center;' +
      'justify-content:center;background:#0a0a0a;padding:24px;' +
      "font-family:'JetBrains Mono','Fira Mono',ui-monospace,monospace;}" +
      '.vibes-gate-box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}' +
      '.vibes-gate-title{color:#FFE600;font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:-1px;}' +
      '.vibes-gate-sub{color:#888;font-size:12px;line-height:1.5;}' +
      '.vibes-gate-input{font-size:16px;padding:12px;background:#161616;border:1px solid #2a2a2a;color:#ececec;border-radius:6px;width:100%;}' +
      '.vibes-gate-input:focus{outline:none;border-color:#FF2D78;}' +
      '.vibes-gate-btn{font-size:16px;padding:12px;background:#FF2D78;color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:1px;}' +
      '.vibes-gate-err{color:#FF2D78;font-size:12px;min-height:16px;}';
    document.head.appendChild(s);
  }

  function buildGate() {
    injectStyle();
    gateEl = document.createElement('div');
    gateEl.className = 'vibes-gate';
    const box = document.createElement('div');
    box.className = 'vibes-gate-box';
    box.innerHTML =
      '<div class="vibes-gate-title">Locked</div>' +
      '<div class="vibes-gate-sub">This one is private. Paste your access token to continue.</div>' +
      '<input class="vibes-gate-input" type="password" autocomplete="current-password" placeholder="access token">' +
      '<button class="vibes-gate-btn" type="button">Unlock</button>' +
      '<div class="vibes-gate-err"></div>';
    gateEl.appendChild(box);
    document.body.appendChild(gateEl);
    gateInput = box.querySelector('.vibes-gate-input');
    gateErr = box.querySelector('.vibes-gate-err');
    const btn = box.querySelector('.vibes-gate-btn');
    const submit = () => {
      const v = gateInput.value.trim();
      if (!v) { gateInput.focus(); return; }
      const r = resolver; resolver = null;
      if (r) r(v);
    };
    btn.addEventListener('click', submit);
    gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
  }

  function showGate(msg) {
    if (!gateEl) buildGate();
    gateEl.style.display = 'flex';
    gateErr.textContent = msg || '';
    gateInput.value = '';
    setTimeout(() => gateInput.focus(), 50);
    return new Promise(res => { resolver = res; });
  }
  function hideGate() { if (gateEl) gateEl.style.display = 'none'; }

  function headers(extra) {
    return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
  }

  async function remoteGet(key) {
    const res = await fetch(BASE + key, { headers: headers(), cache: 'no-store' });
    if (res.status === 401) { const e = new Error('unauthorized'); e.code = 401; throw e; }
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('GET ' + res.status);
    return res.json();
  }

  async function remotePut(key, payload) {
    const res = await fetch(BASE + key, {
      method: 'PUT',
      headers: headers({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(payload)
    });
    if (res.status === 401) { const e = new Error('unauthorized'); e.code = 401; throw e; }
    if (!res.ok) throw new Error('PUT ' + res.status);
    return res.json().catch(() => ({}));
  }

  function readCache(key) {
    try {
      const raw = localStorage.getItem(key);
      if (raw == null) return null;
      return { value: JSON.parse(raw), updatedAt: Number(localStorage.getItem(key + ':updatedAt')) || 0 };
    } catch (e) { return null; }
  }
  function writeCache(key, value, updatedAt) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      localStorage.setItem(key + ':updatedAt', String(updatedAt));
    } catch (e) {}
  }

  // Gate the page on <key>. Resolves to { value, updatedAt, offline }.
  // value is null when the server has nothing stored yet.
  async function unlock(key) {
    for (;;) {
      if (!token) token = await showGate();
      try {
        const remote = await remoteGet(key);
        localStorage.setItem(TOKEN_KEY, token);
        hideGate();
        if (remote) { writeCache(key, remote.value, remote.updatedAt); return { value: remote.value, updatedAt: remote.updatedAt, offline: false }; }
        return { value: null, updatedAt: 0, offline: false };
      } catch (e) {
        if (e.code === 401) { localStorage.removeItem(TOKEN_KEY); token = await showGate('That token did not work.'); continue; }
        const cached = readCache(key);
        if (token && cached) { hideGate(); return { value: cached.value, updatedAt: cached.updatedAt, offline: true }; }
        token = await showGate("Can't reach the server. Check your connection and try again.");
        continue;
      }
    }
  }

  // Cache locally + push to the server. Last-write-wins.
  async function save(key, value) {
    const updatedAt = Date.now();
    writeCache(key, value, updatedAt);
    try { await remotePut(key, { value: value, updatedAt: updatedAt }); return { synced: true }; }
    catch (e) { return { synced: false, error: e }; }
  }

  return { unlock: unlock, save: save };
})();
</script>

<script type="module">
const KEY = 'house-gripes-v1';
const HALF_LIFE_DAYS = 10;
const DAY = 86400000;

let state = { gripes: [], archive: [] };
let editingId = null;

function save() { VibesSync.save(KEY, state); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// Recency-weighted priority: every encounter (tap) decays with a 10-day
// half-life, so a thing that bugged you yesterday outranks one you hammered
// months ago but stopped caring about.
function score(g, now) {
  return g.taps.reduce((sum, t) => sum + Math.pow(0.5, (now - t) / DAY / HALF_LIFE_DAYS), 0);
}

function relTime(ms) {
  const diff = Date.now() - ms;
  if (diff < 60000) return 'just now';
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  const months = Math.floor(days / 30);
  if (months < 12) return months + 'mo ago';
  return Math.floor(months / 12) + 'y ago';
}

function fmtDate(ms) {
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const d = new Date(ms);
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

const itemsEl = document.getElementById('items');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const archiveEl = document.getElementById('archive');
const archiveToggle = document.getElementById('archive-toggle');

function render() {
  const now = Date.now();
  const sorted = [...state.gripes].sort((a, b) => score(b, now) - score(a, now));

  itemsEl.innerHTML = '';
  emptyEl.style.display = sorted.length ? 'none' : 'block';
  countEl.textContent = sorted.length ? sorted.length + ' open' : '';

  sorted.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'nes-container is-rounded gripe';
    card.dataset.id = g.id;

    if (g.id === editingId) {
      card.classList.add('editing');
      card.appendChild(buildEditForm(g));
      itemsEl.appendChild(card);
      return;
    }

    const top = document.createElement('div');
    top.className = 'gripe-top';

    const body = document.createElement('div');

    const rank = document.createElement('span');
    rank.className = 'rank ' + (i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn');
    rank.textContent = '#' + (i + 1);
    body.appendChild(rank);

    const title = document.createElement('p');
    title.className = 'gripe-title';
    title.textContent = g.title;
    body.appendChild(title);

    if (g.notes) {
      const notes = document.createElement('p');
      notes.className = 'gripe-notes';
      notes.textContent = g.notes;
      body.appendChild(notes);
    }

    const meta = document.createElement('div');
    meta.className = 'gripe-meta';
    const hits = g.taps.length;
    meta.innerHTML =
      'bugged you <b>' + hits + 'x</b>' +
      '<span>last ' + relTime(g.taps[g.taps.length - 1]) + '</span>' +
      '<span>added ' + fmtDate(g.created) + '</span>';
    body.appendChild(meta);

    const hint = document.createElement('p');
    hint.className = 'hint';
    hint.textContent = 'tap when it nags you again, it rises';
    body.appendChild(hint);

    top.appendChild(body);

    const actions = document.createElement('div');
    actions.className = 'gripe-actions';

    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'nes-btn is-warning';
    editBtn.textContent = 'edit';
    editBtn.addEventListener('click', (e) => { e.stopPropagation(); editingId = g.id; render(); });

    const doneBtn = document.createElement('button');
    doneBtn.type = 'button';
    doneBtn.className = 'nes-btn is-success';
    doneBtn.textContent = 'done';
    doneBtn.addEventListener('click', (e) => { e.stopPropagation(); finish(g.id); });

    actions.appendChild(editBtn);
    actions.appendChild(doneBtn);
    top.appendChild(actions);

    card.appendChild(top);
    card.addEventListener('click', () => bump(g.id, card));
    itemsEl.appendChild(card);
  });

  renderArchive();
}

function buildEditForm(g) {
  const form = document.createElement('div');
  form.className = 'gripe-edit';

  const f1 = document.createElement('div');
  f1.className = 'nes-field';
  const titleLabel = document.createElement('label');
  titleLabel.textContent = "What's bugging you?";
  const titleInput = document.createElement('input');
  titleInput.type = 'text';
  titleInput.className = 'nes-input';
  titleInput.maxLength = 120;
  titleInput.value = g.title;
  f1.appendChild(titleLabel);
  f1.appendChild(titleInput);

  const f2 = document.createElement('div');
  f2.className = 'nes-field';
  const notesLabel = document.createElement('label');
  notesLabel.textContent = 'Notes (optional)';
  const notesInput = document.createElement('textarea');
  notesInput.className = 'nes-textarea';
  notesInput.maxLength = 500;
  notesInput.value = g.notes || '';
  f2.appendChild(notesLabel);
  f2.appendChild(notesInput);

  const row = document.createElement('div');
  row.className = 'edit-row';
  const saveBtn = document.createElement('button');
  saveBtn.type = 'button';
  saveBtn.className = 'nes-btn is-success save-btn';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => saveEdit(g.id, titleInput.value, notesInput.value));
  const cancelBtn = document.createElement('button');
  cancelBtn.type = 'button';
  cancelBtn.className = 'nes-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => { editingId = null; render(); });
  row.appendChild(saveBtn);
  row.appendChild(cancelBtn);

  const delBtn = document.createElement('button');
  delBtn.type = 'button';
  delBtn.className = 'nes-btn is-error delete-btn';
  delBtn.textContent = 'Delete forever';
  let armed = false;
  delBtn.addEventListener('click', () => {
    if (!armed) {
      armed = true;
      delBtn.textContent = 'Tap again to delete';
      return;
    }
    deleteGripe(g.id);
  });

  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveEdit(g.id, titleInput.value, notesInput.value); }
    if (e.key === 'Escape') { editingId = null; render(); }
  });

  form.appendChild(f1);
  form.appendChild(f2);
  form.appendChild(row);
  form.appendChild(delBtn);

  setTimeout(() => titleInput.focus(), 0);
  return form;
}

function saveEdit(id, title, notes) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  const t = title.trim();
  if (!t) return;
  g.title = t;
  g.notes = notes.trim();
  editingId = null;
  save();
  render();
}

function deleteGripe(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  state.gripes.splice(idx, 1);
  editingId = null;
  save();
  render();
}

function renderArchive() {
  const arch = state.archive;
  archiveToggle.textContent = arch.length
    ? (archiveEl.classList.contains('open') ? '- hide done (' + arch.length + ')' : '+ show done (' + arch.length + ')')
    : '';
  archiveToggle.style.display = arch.length ? 'inline-block' : 'none';

  archiveEl.innerHTML = '';
  for (const g of [...arch].reverse()) {
    const row = document.createElement('div');
    row.className = 'arch-item';

    const left = document.createElement('div');
    const t = document.createElement('div');
    t.className = 'arch-title';
    t.textContent = g.title;
    const d = document.createElement('div');
    d.className = 'arch-date';
    d.textContent = 'done ' + fmtDate(g.doneAt);
    left.appendChild(t);
    left.appendChild(d);

    const restore = document.createElement('button');
    restore.type = 'button';
    restore.className = 'nes-btn is-warning restore-btn';
    restore.textContent = 'restore';
    restore.addEventListener('click', () => restoreGripe(g.id));

    row.appendChild(left);
    row.appendChild(restore);
    archiveEl.appendChild(row);
  }
}

function bump(id, card) {
  const g = state.gripes.find(x => x.id === id);
  if (!g) return;
  g.taps.push(Date.now());
  save();
  if (card) {
    card.style.transform = 'scale(1.02)';
    setTimeout(() => { card.style.transform = ''; }, 130);
  }
  // small delay so the bump is visible before re-sort jumps it
  setTimeout(render, 260);
}

function addGripe() {
  const titleEl = document.getElementById('title');
  const notesEl = document.getElementById('notes');
  const title = titleEl.value.trim();
  if (!title) { titleEl.focus(); return; }
  const now = Date.now();
  state.gripes.push({ id: uid(), title, notes: notesEl.value.trim(), created: now, taps: [now] });
  save();
  titleEl.value = '';
  notesEl.value = '';
  titleEl.focus();
  render();
}

function finish(id) {
  const idx = state.gripes.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.gripes.splice(idx, 1);
  g.doneAt = Date.now();
  state.archive.push(g);
  save();
  render();
  celebrate(g.title);
}

function restoreGripe(id) {
  const idx = state.archive.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [g] = state.archive.splice(idx, 1);
  delete g.doneAt;
  g.taps.push(Date.now());
  state.gripes.push(g);
  save();
  render();
}

document.getElementById('add-btn').addEventListener('click', addGripe);
document.getElementById('title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); addGripe(); }
});
archiveToggle.addEventListener('click', () => {
  archiveEl.classList.toggle('open');
  renderArchive();
});

/* ── Celebration: confetti + giant DONE! ── */
const celebrateEl = document.getElementById('celebrate');
const celebrateSub = document.getElementById('celebrate-sub');
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
const COLORS = ['#e52521', '#f8b800', '#43b047', '#5c94fc', '#ffffff', '#c84c0c'];
let pieces = [];
let rafId = null;

function sizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', sizeCanvas);

function celebrate(title) {
  celebrateSub.textContent = '"' + title + '" is handled';
  celebrateEl.classList.add('show');
  sizeCanvas();
  canvas.style.display = 'block';

  pieces = [];
  const n = 200;
  for (let i = 0; i < n; i++) {
    pieces.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 120,
      y: canvas.height / 2 + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 18,
      vy: (Math.random() - 0.9) * 20,
      size: 8 + Math.random() * 8,
      color: COLORS[(Math.random() * COLORS.length) | 0],
      vr: (Math.random() - 0.5) * 0.3,
      rot: 0,
      life: 0
    });
  }

  if (rafId) cancelAnimationFrame(rafId);
  animate();

  setTimeout(() => {
    celebrateEl.classList.remove('show');
  }, 2200);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of pieces) {
    p.life++;
    p.vy += 0.6;          // gravity
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    const alpha = Math.max(0, 1 - p.life / 130);
    if (alpha > 0 && p.y < canvas.height + 40) alive = true;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    // chunky pixel squares, snapped to a grid for an 8-bit feel
    const px = Math.round(p.x / 4) * 4;
    const py = Math.round(p.y / 4) * 4;
    ctx.fillRect(px, py, p.size, p.size);
  }
  if (alive) {
    rafId = requestAnimationFrame(animate);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    rafId = null;
  }
}

(async function init() {
  const r = await VibesSync.unlock(KEY);
  if (r.value && Array.isArray(r.value.gripes)) state = r.value;
  render();
})();
</script>
