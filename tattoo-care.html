<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<title>Skull Calf Tattoo Care</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #0a0a0a;
    --panel: #161616;
    --panel-2: #1f1f1f;
    --border: #2a2a2a;
    --text: #ececec;
    --text-dim: #888;
    --text-very-dim: #555;
    --blood: #c81e1e;
    --bone: #e8e4d8;
    --done: #3a8a3a;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', ui-monospace, monospace;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  header {
    margin-bottom: 28px;
    text-align: center;
  }
  .hero {
    width: 100%;
    max-width: 320px;
    height: auto;
    display: block;
    margin: 0 auto 8px;
    filter: drop-shadow(0 6px 24px rgba(200, 30, 30, 0.35));
  }
  h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--bone);
    margin: 0 0 8px 0;
    text-transform: uppercase;
  }
  h1 span { color: var(--blood); }
  .sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  @keyframes flicker {
    0%, 100% { transform: scaleY(1) scaleX(1); }
    25%      { transform: scaleY(1.04) scaleX(0.98); }
    50%      { transform: scaleY(0.97) scaleX(1.02); }
    75%      { transform: scaleY(1.02) scaleX(0.99); }
  }
  .flame-outer {
    transform-origin: 50% 100%;
    animation: flicker 2.6s ease-in-out infinite;
  }
  .flame-inner {
    transform-origin: 50% 100%;
    animation: flicker 1.7s ease-in-out infinite reverse;
  }
  @media (prefers-reduced-motion: reduce) {
    .flame-outer, .flame-inner { animation: none; }
  }

  .phase {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
    scroll-margin-top: 16px;
  }
  .phase.current {
    border-color: var(--blood);
    box-shadow: 0 0 0 1px var(--blood) inset;
  }
  .phase-head {
    padding: 14px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }
  .phase.current .phase-head {
    background: rgba(200, 30, 30, 0.08);
  }
  .phase-status {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    margin-bottom: 6px;
    background: var(--border);
    color: var(--text-dim);
  }
  .phase.current .phase-status {
    background: var(--blood);
    color: #fff;
  }
  .phase-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--bone);
    margin-bottom: 4px;
    line-height: 1.25;
  }
  .phase-when {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: lowercase;
  }
  .phase-body { padding: 6px 16px 8px; }
  .task {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.5;
    cursor: pointer;
  }
  .task:last-of-type { border-bottom: none; }
  .task input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border: 2px solid #444;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    background: transparent;
    position: relative;
    transition: background 0.1s, border-color 0.1s;
  }
  .task input[type="checkbox"]:checked {
    background: var(--done);
    border-color: var(--done);
  }
  .task input[type="checkbox"]:checked::after {
    content: '\2713';
    position: absolute;
    inset: 0;
    color: #fff;
    text-align: center;
    line-height: 14px;
    font-size: 13px;
    font-weight: 900;
  }
  .task-text { flex: 1; color: var(--text); }
  .task input[type="checkbox"]:checked ~ .task-text {
    color: var(--text-very-dim);
    text-decoration: line-through;
  }
  .phase-note {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.55;
    padding: 10px 12px;
    margin: 8px 0 4px;
    border-left: 2px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-style: italic;
  }

  @media (max-width: 480px) {
    .page { padding: 24px 16px 60px; }
    h1 { font-size: 26px; }
    .hero { max-width: 240px; }
    .phase-title { font-size: 16px; }
    .task { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <svg class="hero" viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="flameOuter" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%"   stop-color="#3a0000"/>
          <stop offset="30%"  stop-color="#a01818"/>
          <stop offset="65%"  stop-color="#ff5e1a"/>
          <stop offset="100%" stop-color="#ffd84a"/>
        </linearGradient>
        <linearGradient id="flameInner" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%"   stop-color="#7a0000"/>
          <stop offset="50%"  stop-color="#ff6a1a"/>
          <stop offset="100%" stop-color="#fff0a0"/>
        </linearGradient>
      </defs>
      <path class="flame-outer" d="M 25 232 C 10 200, 26 175, 16 150 C 6 120, 32 105, 26 80 C 36 55, 56 65, 62 45 C 68 25, 86 35, 92 18 C 102 -2, 116 24, 126 8 C 140 -6, 152 24, 166 14 C 182 -2, 196 24, 202 40 C 218 36, 226 60, 222 76 C 246 80, 250 106, 240 126 C 264 136, 260 166, 244 176 C 268 196, 258 224, 252 232 Z" fill="url(#flameOuter)"/>
      <path class="flame-inner" d="M 60 218 C 50 196, 66 176, 56 160 C 50 140, 70 130, 66 110 C 76 95, 86 100, 92 80 C 96 64, 106 76, 112 60 C 116 44, 126 60, 136 50 C 146 40, 156 60, 166 60 C 176 60, 182 80, 192 86 C 202 92, 206 106, 200 120 C 216 130, 216 152, 206 166 C 220 176, 216 200, 206 218 Z" fill="url(#flameInner)" opacity="0.92"/>
      <g class="skull">
        <path d="M 140 50 C 85 50, 60 90, 65 130 C 67 150, 75 168, 85 178 L 85 195 L 195 195 L 195 178 C 205 168, 213 150, 215 130 C 220 90, 195 50, 140 50 Z" fill="#ece6d6" stroke="#080808" stroke-width="2" stroke-linejoin="round"/>
        <ellipse cx="110" cy="125" rx="18" ry="22" fill="#080808"/>
        <ellipse cx="170" cy="125" rx="18" ry="22" fill="#080808"/>
        <circle cx="113" cy="120" r="3" fill="#ff3030"/>
        <circle cx="173" cy="120" r="3" fill="#ff3030"/>
        <path d="M 140 152 L 130 175 Q 140 182 150 175 Z" fill="#080808"/>
        <g stroke="#080808" stroke-width="2.2" stroke-linecap="round" fill="none">
          <line x1="85"  y1="190" x2="195" y2="190"/>
          <line x1="100" y1="190" x2="100" y2="206"/>
          <line x1="115" y1="190" x2="115" y2="206"/>
          <line x1="130" y1="190" x2="130" y2="206"/>
          <line x1="145" y1="190" x2="145" y2="206"/>
          <line x1="160" y1="190" x2="160" y2="206"/>
          <line x1="175" y1="190" x2="175" y2="206"/>
        </g>
        <path d="M 90 162 Q 96 172 100 180" fill="none" stroke="#080808" stroke-width="1.5" opacity="0.35"/>
        <path d="M 190 162 Q 184 172 180 180" fill="none" stroke="#080808" stroke-width="1.5" opacity="0.35"/>
      </g>
    </svg>
    <h1>Skull Care<span>.</span></h1>
    <div class="sub">left calf &middot; may 9, 2026 &middot; 6:00 pm</div>
  </header>

  <div id="timeline"></div>
</div>

<script type="module">
const START = new Date('2026-05-09T18:00:00');
const HOUR_MS = 60 * 60 * 1000;

const phases = [
  {
    id: 'p0',
    title: 'Day 1: bandage stays on, treat it like a wound',
    startH: 0, endH: 24,
    rangeLabel: 'first 24 hours',
    note: 'From your artist\'s card: "Treat your tattoo like a fresh wound, do not expose to the elements."',
    tasks: [
      'Leave the bandage on. Don\'t peek',
      'Keep it out of direct sun, dirt, and weather',
      'Sleep with a clean sheet or towel under your left calf in case it leaks',
      'No gym, no swimming, no soaking',
    ],
  },
  {
    id: 'p1',
    title: 'Days 2-3: bandage off, wash + A&D',
    startH: 24, endH: 72,
    rangeLabel: 'days 2-3',
    note: 'From your artist\'s card: "In a day or two remove the bandage... Clean 3 times a day until it\'s completely healed... After cleaning, for the first 2 days, apply a dime\'s worth of A&D ointment."',
    tasks: [
      'Remove the bandage today (or by tomorrow at the latest)',
      'Wash with clean hands and unscented liquid hand soap — no washcloth',
      'Rinse with the water hitting above the tattoo so it runs over, not direct stream onto it',
      'Dab dry with a clean paper towel — never rub',
      'After each wash, apply a dime\'s worth of A&D ointment',
      'Wash + ointment 3 times per day',
      'Loose pants only — no tight socks rubbing the bottom edge',
    ],
  },
  {
    id: 'p2',
    title: 'Day 3+: switch from A&D to white lotion',
    startH: 72, endH: 24 * 14,
    rangeLabel: 'days 4-14',
    note: 'From your artist\'s card: "On the 3rd day start applying a white lotion until it\'s completely healed. Don\'t scrub, itch, pick scabs, use lotions/soaps with scents or dyes."',
    tasks: [
      'Stop using A&D. Switch to a plain unscented white lotion (Aveeno, Lubriderm, CeraVe, or Hustle Butter)',
      'Keep washing 3x per day, dab dry, then a thin layer of lotion',
      'No scented soaps or lotions, no dyes',
      'It will peel and itch — slap it or apply lotion. Do not scratch, do not pick scabs',
      'No soaking, no swimming, no direct sun',
      'Sleep on clean sheets',
      'See a doctor at the first sign of infection (spreading redness, swelling, pus, fever)',
    ],
  },
  {
    id: 'p3',
    title: 'Outer healing — milky stage',
    startH: 24 * 14, endH: 24 * 30,
    rangeLabel: 'days 14-30',
    note: 'The tattoo may look slightly cloudy or "milky" — that is the new layer of skin forming over the ink. Clears up by week 4-6.',
    tasks: [
      'Keep washing and applying unscented lotion until the skin looks and feels normal',
      'Still no soaking, swimming, or direct sun',
      'Resume normal gym and activity, just keep the area clean',
    ],
  },
  {
    id: 'p4',
    title: 'Healed. Now keep it that way.',
    startH: 24 * 30, endH: null,
    rangeLabel: 'day 30 and forever',
    note: 'Outer skin is healed. The rest is lifelong skin care.',
    tasks: [
      'Sunscreen SPF 30+ on the tattoo whenever it is exposed to sun. The single biggest factor in long-term color quality',
      'Keep your skin moisturized — hydrated skin holds ink better and ages slower',
      'Avoid long sessions in chlorinated pools, hot tubs, or salt water when you can',
      'If colors fade noticeably in a few years, that is a touch-up conversation with your artist, not a re-tattoo',
    ],
  },
];

const fmtDate = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }).toLowerCase();

function phaseDateLabel(p) {
  const start = new Date(START.getTime() + p.startH * HOUR_MS);
  if (p.endH === null) return `${fmtDate(start)} → forever`;
  const endDisplay = new Date(START.getTime() + p.endH * HOUR_MS - 1);
  if (fmtDate(start) === fmtDate(endDisplay)) return fmtDate(start);
  return `${fmtDate(start)} – ${fmtDate(endDisplay)}`;
}

const storageKey = (phaseId, taskIdx) => `tattoo-care:${phaseId}:${taskIdx}`;
const loadChecked = (pid, i) => localStorage.getItem(storageKey(pid, i)) === '1';
const saveChecked = (pid, i, v) => v
  ? localStorage.setItem(storageKey(pid, i), '1')
  : localStorage.removeItem(storageKey(pid, i));

const elapsedHours = () => (Date.now() - START.getTime()) / HOUR_MS;

function phaseStatus(p, h) {
  if (p.endH !== null && h >= p.endH) return 'past';
  if (h >= p.startH) return 'current';
  return 'upcoming';
}

function render() {
  const h = elapsedHours();
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  for (const p of phases) {
    const status = phaseStatus(p, h);
    if (status === 'past') continue;

    const el = document.createElement('div');
    el.className = `phase ${status}`;

    const head = document.createElement('div');
    head.className = 'phase-head';
    const statusEl = document.createElement('div');
    statusEl.className = 'phase-status';
    statusEl.textContent = status === 'current' ? 'now' : 'upcoming';
    const titleEl = document.createElement('div');
    titleEl.className = 'phase-title';
    titleEl.textContent = p.title;
    const whenEl = document.createElement('div');
    whenEl.className = 'phase-when';
    whenEl.textContent = `${p.rangeLabel} · ${phaseDateLabel(p)}`;
    head.append(statusEl, titleEl, whenEl);
    el.appendChild(head);

    const body = document.createElement('div');
    body.className = 'phase-body';
    p.tasks.forEach((t, i) => {
      const id = `task-${p.id}-${i}`;
      const label = document.createElement('label');
      label.className = 'task';
      label.htmlFor = id;
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = id;
      cb.checked = loadChecked(p.id, i);
      cb.addEventListener('change', () => saveChecked(p.id, i, cb.checked));
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = t;
      label.append(cb, span);
      body.appendChild(label);
    });
    if (p.note) {
      const note = document.createElement('div');
      note.className = 'phase-note';
      note.textContent = p.note;
      body.appendChild(note);
    }
    el.appendChild(body);
    tl.appendChild(el);
  }
}

render();
setInterval(render, 60_000);
</script>
</body>
</html>
