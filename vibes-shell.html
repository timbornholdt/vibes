<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="vibes">
<meta name="theme-color" content="#0a0e0a">
<title>vibes · shell</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:    #0a0e0a;
    --fg:    #7dffb0;
    --dim:   #2f8a57;
    --bright:#d8ffe8;
    --body:    #ff7a9c;
    --home:    #7ad19a;
    --science: #6fd2ef;
    --music:   #c4a3ff;
    --games:   #ffc46b;
  }

  html, body { height: 100%; }
  body {
    font-family: 'JetBrains Mono', 'Fira Mono', ui-monospace, 'Courier New', monospace;
    background: radial-gradient(120% 120% at 50% 0%, #10241a 0%, var(--bg) 70%);
    color: var(--fg);
    height: 100%;
    overflow: hidden;
    text-shadow: 0 0 5px rgba(125,255,176,0.45);
  }

  /* CRT overlays */
  .scanlines, .flicker {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
  }
  .scanlines {
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode: multiply;
  }
  .flicker { background: rgba(125,255,176,0.025); animation: flick 0.14s infinite alternate; }
  @keyframes flick { from { opacity: 0.25; } to { opacity: 0.55; } }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    box-shadow: inset 0 0 160px rgba(0,0,0,0.7);
  }

  #term {
    position: relative;
    z-index: 1;
    height: 100%;
    overflow-y: auto;
    padding: 22px 20px 80px;
    max-width: 880px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 1.55;
  }
  @media (max-width: 520px) { #term { font-size: 13px; padding: 16px 14px 80px; } }

  .line { white-space: pre-wrap; word-break: break-word; }
  .muted { color: var(--dim); }
  .bright { color: var(--bright); }
  .prompt-echo .ps1 { color: var(--bright); }
  .err { color: #ff6b6b; text-shadow: 0 0 5px rgba(255,107,107,0.5); }

  .tool-link {
    color: var(--bright);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .tool-link:hover { background: var(--fg); color: var(--bg); text-shadow: none; }

  .cat-body    { color: var(--body); }
  .cat-home    { color: var(--home); }
  .cat-science { color: var(--science); }
  .cat-music   { color: var(--music); }
  .cat-games   { color: var(--games); }

  .banner { color: var(--fg); line-height: 1.15; }

  /* live input line */
  #inputline { display: flex; align-items: baseline; gap: 0; }
  #ps1 { color: var(--bright); white-space: pre; }
  #cmd {
    flex: 1;
    background: transparent;
    border: 0;
    outline: none;
    color: var(--bright);
    font-family: inherit;
    font-size: inherit;
    text-shadow: inherit;
    caret-color: transparent;
    padding: 0;
  }
  #caret {
    display: inline-block;
    width: 9px; height: 1.05em;
    background: var(--fg);
    transform: translateY(2px);
    animation: blink 1.05s steps(1) infinite;
    box-shadow: 0 0 6px var(--fg);
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="flicker"></div>
<div class="vignette"></div>

<div id="term">
  <div id="history"></div>
  <div id="inputline">
    <span id="ps1">vibes:~$ </span>
    <input id="cmd" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="terminal input">
    <span id="caret"></span>
  </div>
</div>

<script>
  const tools = [
    { slug: "back-routine",   file: "back-routine.html",   title: "Nightly Back Routine",     cat: "body",    desc: "Guided back mobility with tap-to-start hold timers and a daily streak." },
    { slug: "tattoo-care",    file: "tattoo-care.html",    title: "Skull / Marshmallow Care", cat: "body",    desc: "Tattoo aftercare timeline that auto-hides past phases." },
    { slug: "house-gripes",   file: "house-gripes.html",   title: "Stuff That Sucks",         cat: "home",    desc: "Household annoyances that climb the list each time they bug you." },
    { slug: "patio",          file: "patio.html",          title: "Patio",                    cat: "home",    desc: "Visualize design options for the back patio." },
    { slug: "anatomy-lab",    file: "anatomy-lab.html",    title: "Anatomy Lab",              cat: "science", desc: "Tap any bone, muscle, or organ to learn what it does." },
    { slug: "lofi-guide",     file: "lofi-guide.html",     title: "A Field Guide to Lo-Fi",   cat: "music",   desc: "A checkable listening path through the genre's foundations." },
    { slug: "music-syllabus", file: "music-syllabus.html", title: "The Syllabus",             cat: "music",   desc: "A 14-album guided listen across punk, emo, folk and more." },
    { slug: "ps2-curriculum", file: "ps2-curriculum.html", title: "PS2 Gaming Curriculum",    cat: "games",   desc: "12 all-timers sequenced by genre. A syllabus for games." },
  ];
  const categories = ["body", "home", "science", "music", "games"];

  const history = document.getElementById("history");
  const cmdEl = document.getElementById("cmd");
  const term = document.getElementById("term");
  const cmdHist = [];
  let histIdx = -1;

  const esc = (s) => s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  function out(html, cls) {
    const div = document.createElement("div");
    div.className = "line" + (cls ? " " + cls : "");
    div.innerHTML = html;
    history.appendChild(div);
  }
  function blank() { out("&nbsp;"); }
  function linkFor(t) {
    return `<span class="tool-link" data-file="${t.file}">${esc(t.title)}</span>`;
  }
  function scrollDown() { term.scrollTop = term.scrollHeight; }

  function banner() {
    out(
`<span class="banner">        _ _
 __ __(_) |__  ___ ___
 \\ V /| | '_ \\/ -_|_-<
  \\_/ |_|_.__/\\___/__/   shell</span>`);
    out(`<span class="muted">junk.timbornholdt.com — ${tools.length} tools loaded</span>`);
    blank();
    out(`Type <span class="bright">help</span> for commands, or a tool name to open it. Click any <span class="tool-link">underlined</span> name too.`);
    blank();
  }

  const commands = {
    help() {
      out(`<span class="bright">commands</span>`);
      const rows = [
        ["ls [category]", "list tools, optionally filtered by category"],
        ["tools", "list every tool with a one-line description"],
        ["cat <name>", "print what a tool does before opening it"],
        ["open <name>", "launch a tool (or just type its name)"],
        ["categories", "show categories and how many live in each"],
        ["random", "open a tool at random"],
        ["clear", "wipe the screen"],
      ];
      rows.forEach(([c, d]) => out(`  <span class="bright">${c.padEnd(16)}</span><span class="muted">${esc(d)}</span>`));
      blank();
      out(`<span class="muted">tip: ↑/↓ for history, Tab to autocomplete a name</span>`);
    },
    ls(arg) {
      let list = tools;
      if (arg) {
        if (!categories.includes(arg)) { out(`ls: no such category: <span class="err">${esc(arg)}</span>`, ); return; }
        list = tools.filter(t => t.cat === arg);
      }
      list.forEach(t =>
        out(`  <span class="cat-${t.cat}">${("[" + t.cat + "]").padEnd(10)}</span>${linkFor(t)}`));
    },
    tools() {
      tools.forEach(t => {
        out(`  ${linkFor(t)} <span class="muted cat-${t.cat}">(${t.cat})</span>`);
        out(`    <span class="muted">${esc(t.desc)}</span>`);
      });
    },
    categories() {
      categories.forEach(c => {
        const n = tools.filter(t => t.cat === c).length;
        out(`  <span class="cat-${c}">${c.padEnd(10)}</span><span class="muted">${n} tool${n === 1 ? "" : "s"}</span>`);
      });
    },
    cat(arg) {
      if (!arg) { out(`cat: usage: <span class="bright">cat &lt;name&gt;</span>`, "err"); return; }
      const t = find(arg);
      if (!t) { return notFound(arg); }
      out(`<span class="bright">${esc(t.title)}</span> <span class="cat-${t.cat}">[${t.cat}]</span>`);
      out(`<span class="muted">${esc(t.desc)}</span>`);
      out(`open it: ${linkFor(t)}  <span class="muted">(${t.file})</span>`);
    },
    open(arg) {
      if (!arg) { out(`open: usage: <span class="bright">open &lt;name&gt;</span>`, "err"); return; }
      const t = find(arg);
      if (!t) { return notFound(arg); }
      launch(t);
    },
    random() {
      const t = tools[Math.floor(Math.random() * tools.length)];
      out(`rolling… → <span class="bright">${esc(t.title)}</span>`);
      launch(t);
    },
    clear() { history.innerHTML = ""; },
  };

  function find(q) {
    q = q.toLowerCase();
    return tools.find(t => t.slug === q)
      || tools.find(t => t.slug.includes(q))
      || tools.find(t => t.title.toLowerCase().includes(q));
  }
  function notFound(arg) {
    out(`<span class="err">command not found: ${esc(arg)}</span>`);
    out(`<span class="muted">try </span><span class="bright">ls</span><span class="muted"> or </span><span class="bright">help</span>`);
  }
  function launch(t) {
    out(`launching <span class="bright">${esc(t.title)}</span> <span class="muted">…</span>`);
    scrollDown();
    setTimeout(() => { window.location.href = t.file; }, 320);
  }

  function run(raw) {
    const input = raw.trim();
    out(`<span class="ps1">vibes:~$ </span>${esc(raw)}`, "prompt-echo");
    if (!input) return;
    cmdHist.push(input); histIdx = cmdHist.length;
    const [name, ...rest] = input.split(/\s+/);
    const arg = rest.join(" ").toLowerCase();
    if (commands[name]) { commands[name](arg); return; }
    // bare tool name → open
    const t = find(input);
    if (t) { launch(t); return; }
    notFound(name);
  }

  // ── input handling ──
  cmdEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      run(cmdEl.value);
      cmdEl.value = "";
      scrollDown();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; cmdEl.value = cmdHist[histIdx]; }
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      if (histIdx < cmdHist.length - 1) { histIdx++; cmdEl.value = cmdHist[histIdx]; }
      else { histIdx = cmdHist.length; cmdEl.value = ""; }
    } else if (e.key === "Tab") {
      e.preventDefault();
      const parts = cmdEl.value.split(/\s+/);
      const frag = parts[parts.length - 1].toLowerCase();
      if (!frag) return;
      const match = tools.find(t => t.slug.startsWith(frag));
      if (match) { parts[parts.length - 1] = match.slug; cmdEl.value = parts.join(" "); }
    } else if (e.key === "l" && e.ctrlKey) {
      e.preventDefault(); commands.clear();
    }
  });

  history.addEventListener("click", (e) => {
    const link = e.target.closest(".tool-link[data-file]");
    if (link) window.location.href = link.dataset.file;
  });

  // keep focus on the input
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".tool-link")) cmdEl.focus();
  });
  window.addEventListener("load", () => cmdEl.focus());

  banner();
  scrollDown();
</script>
</body>
</html>
