<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Sketchpad</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #ffffff;
  }

  #pad {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: crosshair;
  }

  .bar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(14px + env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(20, 20, 22, 0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 999px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .bar button {
    appearance: none;
    border: none;
    margin: 0;
    padding: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border-radius: 50%;
    cursor: pointer;
    color: #e8e8e8;
    font-size: 20px;
    line-height: 1;
  }
  .bar button:active { background: rgba(255, 255, 255, 0.14); }

  .sep {
    width: 1px;
    height: 26px;
    background: rgba(255, 255, 255, 0.18);
  }

  .w .dot {
    border-radius: 50%;
    background: #e8e8e8;
  }
  .w[data-w="3"]  .dot { width: 5px;  height: 5px; }
  .w[data-w="8"]  .dot { width: 11px; height: 11px; }
  .w[data-w="18"] .dot { width: 19px; height: 19px; }
  .w.on { background: rgba(255, 255, 255, 0.22); }
  .w.on .dot { background: #ffffff; }

  #swatch {
    position: relative;
    overflow: hidden;
  }
  #swatch .chip {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #111111;
    border: 2px solid rgba(255, 255, 255, 0.85);
    pointer-events: none;
  }
  #swatch input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: none;
    padding: 0;
    cursor: pointer;
    font-size: 16px;
  }
</style>
</head>
<body>

<canvas id="pad"></canvas>

<div class="bar">
  <button id="back" aria-label="Back">&#8592;</button>
  <div class="sep"></div>
  <button class="w" data-w="3" aria-label="Thin line"><span class="dot"></span></button>
  <button class="w on" data-w="8" aria-label="Medium line"><span class="dot"></span></button>
  <button class="w" data-w="18" aria-label="Thick line"><span class="dot"></span></button>
  <div class="sep"></div>
  <button id="swatch" aria-label="Color">
    <span class="chip"></span>
    <input type="color" id="color" value="#111111">
  </button>
  <div class="sep"></div>
  <button id="clear" aria-label="Clear canvas">&#10005;</button>
</div>

<script type="module">
const canvas = document.getElementById('pad');
const ctx = canvas.getContext('2d');
const colorInput = document.getElementById('color');
const chip = document.querySelector('#swatch .chip');

let lineWidth = 8;
let color = colorInput.value;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  // preserve the drawing across resizes / rotation
  let saved = null;
  if (canvas.width > 0 && canvas.height > 0) {
    saved = document.createElement('canvas');
    saved.width = canvas.width;
    saved.height = canvas.height;
    saved.getContext('2d').drawImage(canvas, 0, 0);
  }
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (saved) ctx.drawImage(saved, 0, 0, saved.width / dpr, saved.height / dpr);
}
resize();
window.addEventListener('resize', resize);

let drawing = false;
let activeId = null;
let last = null;

function pos(e) {
  return { x: e.clientX, y: e.clientY };
}

canvas.addEventListener('pointerdown', (e) => {
  if (drawing) return;
  drawing = true;
  activeId = e.pointerId;
  last = pos(e);
  try { canvas.setPointerCapture(e.pointerId); } catch {}
  // a bare tap leaves a dot
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.beginPath();
  ctx.moveTo(last.x, last.y);
  ctx.lineTo(last.x + 0.01, last.y);
  ctx.stroke();
});

canvas.addEventListener('pointermove', (e) => {
  if (!drawing || e.pointerId !== activeId) return;
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  for (const ev of events) {
    const p = pos(ev);
    const mid = { x: (last.x + p.x) / 2, y: (last.y + p.y) / 2 };
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.quadraticCurveTo(last.x, last.y, mid.x, mid.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last = p;
  }
});

function endStroke(e) {
  if (e.pointerId !== activeId) return;
  drawing = false;
  activeId = null;
  last = null;
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);

document.querySelectorAll('.w').forEach((btn) => {
  btn.addEventListener('click', () => {
    lineWidth = Number(btn.dataset.w);
    document.querySelectorAll('.w').forEach((b) => b.classList.toggle('on', b === btn));
  });
});

colorInput.addEventListener('input', () => {
  color = colorInput.value;
  chip.style.background = color;
});

document.getElementById('clear').addEventListener('click', () => {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
});

document.getElementById('back').addEventListener('click', () => {
  if (history.length > 1) history.back();
  else window.location.href = 'index.html';
});
</script>
</body>
</html>
