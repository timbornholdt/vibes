<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Album Publisher</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root {
    /* DMG-01 four-shade LCD + shell */
    --g0: #9bbc0f;   /* lcd lightest (background) */
    --g1: #8bac0f;   /* lcd light */
    --g2: #306230;   /* lcd dark */
    --g3: #0f380f;   /* lcd darkest (ink) */
    --shell: #c9c5bc;
    --shell-dark: #a8a49b;
    --bezel: #4a4658;
    --btn: #8b2f5f;  /* A/B button burgundy */
    --pix: "Press Start 2P", monospace;
    --mono: ui-monospace, Menlo, "Courier New", monospace;
  }
  html, body { margin: 0; padding: 0; background: var(--shell);
    font-family: var(--mono); font-size: 16px; line-height: 1.5; }
  body { display: flex; justify-content: center; min-height: 100vh;
    background-image: radial-gradient(circle at 30% 10%, #d5d1c8, var(--shell) 60%); }

  .shell { width: 100%; max-width: 560px; padding: 18px 14px 28px; }

  /* ── screen bezel ── */
  .bezel { background: var(--bezel); border-radius: 12px 12px 40px 12px;
    padding: 26px 18px 20px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.25); }
  .bezel-top { display: flex; align-items: center; gap: 10px; margin: -16px 0 12px; }
  .bezel-line { flex: 1; height: 4px; border-top: 1px solid #6c6880; border-bottom: 1px solid #6c6880; }
  .bezel-caption { font-family: var(--pix); font-size: 7px; color: #b8b4c8; letter-spacing: 1px;
    white-space: nowrap; }
  .battery { display: flex; align-items: center; gap: 6px; margin: 0 0 10px 2px; }
  .battery .dot { width: 8px; height: 8px; border-radius: 50%; background: #e0331f;
    box-shadow: 0 0 6px #e0331f; }
  .battery span { font-family: var(--pix); font-size: 7px; color: #b8b4c8; letter-spacing: 1px; }

  /* ── the LCD ── */
  .lcd { background: var(--g0); color: var(--g3); padding: 16px 14px 20px; min-height: 380px;
    box-shadow: inset 0 0 0 2px var(--g1), inset 0 3px 10px rgba(15,56,15,0.35);
    background-image: repeating-linear-gradient(0deg, rgba(15,56,15,0.05) 0 1px, transparent 1px 3px); }
  .lcd h1 { font-family: var(--pix); font-size: 13px; margin: 0 0 6px; letter-spacing: 0.5px; }
  .lcd .sub { font-family: var(--pix); font-size: 7px; color: var(--g2); margin: 0 0 16px;
    letter-spacing: 0.5px; line-height: 1.8; }
  .label { font-family: var(--pix); font-size: 7px; letter-spacing: 1px; color: var(--g2);
    margin: 16px 2px 6px; text-transform: uppercase; }
  input, textarea { font-family: var(--mono); font-size: 16px; color: var(--g3);
    background: var(--g0); border: 2px solid var(--g3); border-radius: 0; width: 100%;
    padding: 8px 10px; }
  input:focus, textarea:focus { outline: 2px solid var(--g2); outline-offset: 1px; }
  input::placeholder, textarea::placeholder { color: var(--g2); opacity: 0.8; }

  button { font-family: var(--pix); font-size: 9px; letter-spacing: 1px; cursor: pointer;
    text-transform: uppercase; }
  .primary { background: var(--g3); color: var(--g0); border: 2px solid var(--g3);
    padding: 10px 16px; box-shadow: 2px 2px 0 var(--g2); }
  .primary:active { transform: translate(2px, 2px); box-shadow: none; }
  .primary:disabled { opacity: 0.5; cursor: default; }
  .ghost { background: var(--g0); color: var(--g3); border: 2px solid var(--g3);
    padding: 10px 14px; }
  .back { background: none; border: none; color: var(--g3); padding: 0; margin: 0 0 14px;
    font-size: 8px; }
  .back::before { content: "◄ "; }

  .status { min-height: 20px; font-family: var(--pix); font-size: 8px; line-height: 1.8;
    color: var(--g2); margin: 12px 2px; }
  .status.err { background: var(--g3); color: var(--g0); padding: 4px 6px; display: inline-block; }
  .status.err::before { content: "! "; }
  .status.ok::before { content: "★ "; }
  .status.ok { color: var(--g3); }
  @keyframes blink { 50% { opacity: 0; } }
  .blink { animation: blink 1s steps(1) infinite; }

  /* ── results ── */
  .section-label { font-family: var(--pix); font-size: 7px; letter-spacing: 1px; color: var(--g2);
    margin: 18px 2px 8px; text-transform: uppercase; }
  .section-label::before { content: "▶ "; }
  .result { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    background: var(--g0); border: 2px solid var(--g3); padding: 8px; margin-bottom: 8px;
    color: var(--g3); font-family: var(--mono); }
  .result:active { background: var(--g1); }
  img.art { filter: grayscale(1) brightness(1.05) contrast(1.1) sepia(1) hue-rotate(52deg) saturate(2.2);
    image-rendering: pixelated; }
  .result img, .result .noart { width: 48px; height: 48px; object-fit: cover; flex: none;
    border: 2px solid var(--g3); background: var(--g1); }
  .result .noart { display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .result .meta { min-width: 0; }
  .result .t { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result .a { font-size: 13px; color: var(--g2); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .result .badge { margin-left: auto; flex: none; font-family: var(--pix); font-size: 6px;
    letter-spacing: 1px; padding: 4px 6px; border: 2px solid var(--g3); text-transform: uppercase; }
  .result .badge.site { background: var(--g3); color: var(--g0); }

  /* ── detail / editor ── */
  .detail { text-align: center; }
  .detail img { width: min(60vw, 260px); border: 3px solid var(--g3); }
  .detail h2 { font-family: var(--pix); font-size: 11px; line-height: 1.8; margin: 14px 0 4px; }
  .detail .artist { margin: 0; color: var(--g2); }
  .detail .facts { font-family: var(--pix); font-size: 7px; color: var(--g2); margin: 12px 0 0;
    line-height: 1.8; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 10px; }
  .chip { font-family: var(--pix); font-size: 6px; border: 1px solid var(--g2); padding: 4px 7px;
    color: var(--g2); letter-spacing: 1px; text-transform: uppercase; }
  .detail .row { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }

  .editor .head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .editor .head img, .editor .head .noart { width: 52px; height: 52px; object-fit: cover;
    flex: none; border: 2px solid var(--g3); background: var(--g1); }
  .editor .head .noart { display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .editor .head .t { font-weight: 700; }
  .editor .head .a { font-size: 13px; color: var(--g2); }
  .editor .head a { color: var(--g3); font-size: 12px; }
  .editor textarea { min-height: 42vh; line-height: 1.5; resize: vertical; }
  .editor .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
  .editor .row .spacer { flex: 1; }

  /* ── boot gate ── */
  #gate { text-align: center; padding-top: 30px; }
  #gate .logo { font-family: var(--pix); font-size: 18px; letter-spacing: 2px; margin: 0 0 4px;
    animation: drop 1.1s ease-out; }
  @keyframes drop { from { transform: translateY(-70px); } to { transform: translateY(0); } }
  #gate .tm { font-family: var(--pix); font-size: 7px; color: var(--g2); letter-spacing: 1px;
    margin: 0 0 34px; }
  #gate input { max-width: 300px; text-align: center; }
  #gate .primary { margin-top: 16px; }

  .panel { border: 2px solid var(--g3); padding: 12px; margin-bottom: 16px; }
  .panel.hidden { display: none; }
  .panel .hint { font-size: 12px; color: var(--g2); margin: 6px 0 0; }
  .panel .row { display: flex; gap: 8px; margin-top: 14px; }
  .hidden { display: none; }

  /* ── shell chrome below the screen ── */
  .chrome { display: flex; align-items: flex-end; justify-content: space-between;
    margin-top: 18px; padding: 0 6px; }
  .brand { font-style: italic; font-weight: 700; color: #5a5664; font-size: 20px;
    font-family: -apple-system, sans-serif; letter-spacing: 0.5px; }
  .brand sup { font-size: 9px; }
  .selects { display: flex; gap: 14px; align-items: center; }
  .pill-wrap { text-align: center; }
  .pill { display: block; width: 52px; height: 14px; border-radius: 10px; background: var(--shell-dark);
    border: none; box-shadow: inset 0 -2px 3px rgba(0,0,0,0.35), 0 1px 0 #fff; transform: rotate(-22deg); }
  .pill:active { box-shadow: inset 0 2px 3px rgba(0,0,0,0.4); }
  .pill-wrap .cap { font-family: var(--pix); font-size: 6px; color: #7a7668; letter-spacing: 1px;
    display: block; margin-top: 8px; }
  .speaker { display: grid; grid-template-columns: repeat(6, 6px); gap: 7px; transform: rotate(-22deg);
    margin-right: 4px; }
  .speaker i { width: 6px; height: 34px; border-radius: 4px; background: var(--shell-dark);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.35); }
</style>
</head>
<body>
<div class="shell">
  <div class="bezel">
    <div class="bezel-top">
      <div class="bezel-line"></div>
      <div class="bezel-caption">DOT MATRIX WITH PLEX LINK</div>
      <div class="bezel-line"></div>
    </div>
    <div class="battery"><div class="dot"></div><span>BATTERY</span></div>
    <div class="lcd">

      <div id="gate">
        <p class="logo">ALBUM BOY</p>
        <p class="tm">&trade; TIMTENDO CO. 2026</p>
        <div class="label">Enter password</div>
        <input id="gateToken" type="password" autocomplete="off" placeholder="album api token">
        <br>
        <button class="primary" id="gateGo">Start</button>
        <div class="status" id="gateStatus"><span class="blink">PRESS START</span></div>
      </div>

      <div id="app" class="hidden">
        <h1>ALBUM PUBLISHER</h1>
        <p class="sub">PLEX &rarr; TIMBORNHOLDT.COM &middot; REVIEWS FROM ANYWHERE</p>

        <div class="panel hidden" id="settings">
          <div class="label">Plex server URL</div>
          <input id="plexUrl" type="url" placeholder="https://10-0-0-12.hash.plex.direct:32400" autocomplete="off">
          <div class="label">Plex token</div>
          <input id="plexToken" type="password" placeholder="X-Plex-Token" autocomplete="off">
          <p class="hint">Shared with Timamp — prefilled if that's set up on this device.</p>
          <div class="row">
            <button class="primary" id="saveSettings">Save</button>
            <button class="ghost" id="closeSettings">Close</button>
          </div>
        </div>

        <div id="searchView">
          <input id="q" type="search" placeholder="search album or artist..."
            autocomplete="off" autocapitalize="off" spellcheck="false">
          <div class="status" id="status"></div>
          <div id="results"></div>
        </div>

        <div id="detailView" class="hidden">
          <button class="back" id="detailBack">back to search</button>
          <div class="detail" id="detailBody"></div>
        </div>

        <div id="editorView" class="hidden editor">
          <button class="back" id="editorBack">back to search</button>
          <div class="head" id="editorHead"></div>
          <textarea id="review" placeholder="Write the review (Markdown — [youtube]ID[/youtube] works too)"></textarea>
          <div class="row">
            <button class="primary" id="saveReview">Save review</button>
            <span class="spacer"></span>
            <span class="status" id="editorStatus"></span>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div class="chrome">
    <div class="brand">Album Boy<sup>&trade;</sup></div>
    <div class="selects">
      <div class="pill-wrap">
        <button class="pill" id="gearBtn" aria-label="settings"></button>
        <span class="cap">SELECT</span>
      </div>
      <div class="speaker"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </div>
  </div>
</div>

<script type="module">
const $ = (id) => document.getElementById(id);
const LS = { plexUrl: 'timamp_url', plexToken: 'timamp_token', siteToken: 'album-api-token',
  siteBase: 'album-api-base' };
const SITE = localStorage.getItem(LS.siteBase) || 'https://timbornholdt.com';

let plexBase = (localStorage.getItem(LS.plexUrl) || '').replace(/\/+$/, '');
let plexToken = localStorage.getItem(LS.plexToken) || '';
let siteToken = localStorage.getItem(LS.siteToken) || '';
let current = null; // plex album selected for import

// ── boot gate ──
async function tokenValid() {
  try {
    const res = await fetch(SITE + '/api/v1/albums?q=a',
      { headers: { Authorization: 'Bearer ' + siteToken } });
    return res.ok ? true : (res.status === 401 ? false : null); // null = site unreachable/erroring
  } catch (e) { return null; }
}
function gateMsg(msg, kind) {
  $('gateStatus').className = 'status ' + (kind || '');
  $('gateStatus').innerHTML = msg;
}
function lock(msg) {
  $('app').classList.add('hidden');
  $('gate').classList.remove('hidden');
  gateMsg(msg || '<span class="blink">PRESS START</span>', msg ? 'err' : '');
}
function unlock() {
  $('gate').classList.add('hidden');
  $('app').classList.remove('hidden');
  if (!plexBase || !plexToken) openSettings();
}
$('gateGo').addEventListener('click', tryUnlock);
$('gateToken').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
async function tryUnlock() {
  const entered = $('gateToken').value.trim();
  if (entered) siteToken = entered;
  if (!siteToken) { gateMsg('ENTER PASSWORD', 'err'); return; }
  gateMsg('CHECKING&hellip;');
  const ok = await tokenValid();
  if (ok === true) {
    localStorage.setItem(LS.siteToken, siteToken);
    $('gateToken').value = '';
    unlock();
  } else if (ok === false) {
    gateMsg('WRONG PASSWORD', 'err');
  } else {
    gateMsg('CANNOT REACH SITE', 'err');
  }
}
(async function boot() {
  if (!siteToken) { lock(); return; }
  const ok = await tokenValid();
  if (ok === true) unlock();
  else lock(ok === false ? 'PASSWORD EXPIRED' : 'CANNOT REACH SITE');
})();

// ── settings (plex only — the gate owns the site token) ──
function openSettings() {
  $('plexUrl').value = plexBase;
  $('plexToken').value = plexToken;
  $('settings').classList.remove('hidden');
}
function closeSettings() { $('settings').classList.add('hidden'); }
$('gearBtn').addEventListener('click', () => {
  if ($('app').classList.contains('hidden')) return; // locked
  $('settings').classList.contains('hidden') ? openSettings() : closeSettings();
});
$('closeSettings').addEventListener('click', closeSettings);
$('saveSettings').addEventListener('click', () => {
  plexBase = $('plexUrl').value.trim().replace(/\/+$/, '');
  plexToken = $('plexToken').value.trim();
  localStorage.setItem(LS.plexUrl, plexBase);
  localStorage.setItem(LS.plexToken, plexToken);
  closeSettings();
  setStatus('SETTINGS SAVED', 'ok');
  if ($('q').value.trim()) runSearch($('q').value.trim());
});

// ── status ──
function setStatus(msg, kind = '') { const s = $('status'); s.textContent = msg; s.className = 'status ' + kind; }

// ── plex helpers (token in query + safelisted Accept header = no preflight, same as timamp) ──
function plexUrl(path, extra = {}) {
  const u = new URL(plexBase + path);
  u.searchParams.set('X-Plex-Token', plexToken);
  for (const [k, v] of Object.entries(extra)) u.searchParams.set(k, v);
  return u.toString();
}
async function plexJson(path, extra) {
  const res = await fetch(plexUrl(path, extra), { headers: { Accept: 'application/json' } });
  if (res.status === 401) throw new Error('PLEX: BAD TOKEN');
  if (!res.ok) throw new Error('PLEX: ' + res.status);
  return res.json();
}
function artUrl(thumb, size) {
  if (!thumb) return null;
  return plexUrl('/photo/:/transcode', { url: thumb, width: size, height: size, minSize: 1, upscale: 1 });
}

// ── site API helpers ──
async function siteFetch(path, opts = {}) {
  const res = await fetch(SITE + path, {
    ...opts,
    headers: { Authorization: 'Bearer ' + siteToken, ...(opts.headers || {}) },
  });
  if (res.status === 401) { lock('PASSWORD EXPIRED'); throw new Error('SITE: 401'); }
  if (!res.ok) throw new Error('SITE: ' + res.status);
  return res.status === 204 ? null : res.json();
}
const siteSearch = (q) => siteFetch('/api/v1/albums?q=' + encodeURIComponent(q));
const siteShow = (slug) => siteFetch('/api/v1/albums/' + encodeURIComponent(slug));

// ── views ──
function show(view) {
  for (const v of ['searchView', 'detailView', 'editorView']) $(v).classList.toggle('hidden', v !== view);
}
$('detailBack').addEventListener('click', () => show('searchView'));
$('editorBack').addEventListener('click', () => show('searchView'));

// ── search ──
let debounce = null;
let searchSeq = 0;
$('q').addEventListener('input', () => {
  clearTimeout(debounce);
  const q = $('q').value.trim();
  if (q.length < 2) { $('results').innerHTML = ''; setStatus(''); return; }
  debounce = setTimeout(() => runSearch(q), 350);
});

async function runSearch(q) {
  if (!plexBase || !plexToken) { openSettings(); setStatus('SET PLEX URL + TOKEN FIRST', 'err'); return; }
  const seq = ++searchSeq;
  setStatus('SEARCHING…');
  const [site, plex] = await Promise.allSettled([siteSearch(q), plexSearch(q)]);
  if (seq !== searchSeq) return; // a newer search superseded this one
  const errs = [site, plex].filter((r) => r.status === 'rejected').map((r) => r.reason.message);
  setStatus(errs.join(' · '), errs.length ? 'err' : '');
  renderResults(site.status === 'fulfilled' ? site.value.albums : [],
    plex.status === 'fulfilled' ? plex.value : []);
}

async function plexSearch(q) {
  const data = await plexJson('/hubs/search', { query: q, limit: 12 });
  const hubs = (data.MediaContainer && data.MediaContainer.Hub) || [];
  const hub = (type) => (hubs.find((h) => h.type === type) || {}).Metadata || [];
  const albums = hub('album');
  // fold in albums by matching artists, skipping ones the album hub already found
  for (const artist of hub('artist').slice(0, 3)) {
    try {
      const kids = await plexJson('/library/metadata/' + artist.ratingKey + '/children');
      const seen = new Set(albums.map((a) => a.ratingKey));
      for (const kid of (kids.MediaContainer && kids.MediaContainer.Metadata) || []) {
        if (!seen.has(kid.ratingKey)) albums.push(kid);
      }
    } catch (e) { /* artist expansion is best-effort */ }
  }
  return albums;
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function resultRow({ art, title, artist, badge, badgeClass }) {
  const img = art ? `<img class="art" src="${esc(art)}" alt="" loading="lazy">` : '<div class="noart">♪</div>';
  return `${img}<div class="meta"><div class="t">${esc(title)}</div><div class="a">${esc(artist)}</div></div>
    <span class="badge ${badgeClass || ''}">${badge}</span>`;
}

function renderResults(siteAlbums, plexAlbums) {
  const box = $('results');
  box.innerHTML = '';
  const onSite = (title, artist) => siteAlbums.find((a) =>
    a.title.toLowerCase() === String(title).toLowerCase() &&
    a.artist.toLowerCase() === String(artist).toLowerCase());

  if (siteAlbums.length) {
    box.insertAdjacentHTML('beforeend', '<div class="section-label">on the site — edit review</div>');
    for (const a of siteAlbums) {
      const btn = document.createElement('button');
      btn.className = 'result';
      btn.innerHTML = resultRow({ art: a.album_art_url, title: a.title, artist: a.artist,
        badge: 'edit', badgeClass: 'site' });
      btn.addEventListener('click', () => openEditor(a.slug));
      box.appendChild(btn);
    }
  }
  const fresh = plexAlbums.filter((p) => !onSite(p.title, p.parentTitle));
  if (fresh.length) {
    box.insertAdjacentHTML('beforeend', '<div class="section-label">in plex — import</div>');
    for (const p of fresh) {
      const btn = document.createElement('button');
      btn.className = 'result';
      btn.innerHTML = resultRow({ art: artUrl(p.thumb, 120), title: p.title,
        artist: p.parentTitle || '', badge: 'import' });
      btn.addEventListener('click', () => openDetail(p.ratingKey));
      box.appendChild(btn);
    }
  }
  if (!siteAlbums.length && !fresh.length) {
    box.innerHTML = '<div class="section-label">no results in plex or on the site</div>';
  }
}

// ── import detail ──
async function openDetail(ratingKey) {
  setStatus('LOADING…');
  let meta;
  try {
    const data = await plexJson('/library/metadata/' + ratingKey);
    meta = data.MediaContainer.Metadata[0];
  } catch (e) { setStatus(e.message, 'err'); return; }
  setStatus('');

  current = {
    title: meta.title,
    artist: meta.parentTitle || '',
    releasedAt: meta.originallyAvailableAt || null,
    year: meta.year || null,
    genres: (meta.Genre || []).map((g) => g.tag),
    thumb: meta.thumb,
  };
  const facts = [current.releasedAt ? 'RELEASED ' + current.releasedAt
    : (current.year ? 'RELEASED ' + current.year + ' (NO EXACT DATE IN PLEX)' : 'NO RELEASE DATE IN PLEX')];
  $('detailBody').innerHTML = `
    ${current.thumb ? `<img class="art" src="${esc(artUrl(current.thumb, 600))}" alt="album art">` : ''}
    <h2>${esc(current.title)}</h2>
    <p class="artist">${esc(current.artist)}</p>
    <p class="facts">${esc(facts.join(''))}</p>
    <div class="chips">${current.genres.map((g) => `<span class="chip">${esc(g)}</span>`).join('')}</div>
    <div class="row"><button class="primary" id="importBtn">Import &#9654;</button></div>
    <div class="status" id="importStatus"></div>`;
  $('importBtn').addEventListener('click', importCurrent);
  show('detailView');
}

async function importCurrent() {
  const btn = $('importBtn');
  const st = $('importStatus');
  btn.disabled = true;
  st.textContent = 'IMPORTING…';
  st.className = 'status';
  try {
    const fd = new FormData();
    fd.append('album[title]', current.title);
    fd.append('album[artist_name]', current.artist);
    if (current.releasedAt) fd.append('album[released_at]', current.releasedAt);
    for (const g of current.genres) fd.append('album[genre_names][]', g);
    if (current.thumb) {
      st.textContent = 'PULLING ART FROM PLEX…';
      const art = await fetch(artUrl(current.thumb, 1600));
      if (art.ok) {
        const blob = await art.blob();
        fd.append('album[album_art]', blob, 'album-art.jpg');
      }
    }
    st.textContent = 'UPLOADING…';
    const created = await siteFetch('/api/v1/albums', { method: 'POST', body: fd });
    st.textContent = 'IMPORTED!';
    st.className = 'status ok';
    await openEditor(created.slug);
  } catch (e) {
    st.textContent = e.message;
    st.className = 'status err';
    btn.disabled = false;
  }
}

// ── review editor ──
let editing = null;
async function openEditor(slug) {
  setStatus('LOADING…');
  let album;
  try { album = await siteShow(slug); } catch (e) { setStatus(e.message, 'err'); return; }
  setStatus('');
  editing = album;
  const img = album.album_art_url ? `<img class="art" src="${esc(album.album_art_url)}" alt="">`
    : '<div class="noart">♪</div>';
  $('editorHead').innerHTML = `${img}
    <div><div class="t">${esc(album.title)}</div><div class="a">${esc(album.artist)}</div>
    <a href="${SITE}/albums/${esc(album.slug)}" target="_blank" rel="noopener">view on site &nearr;</a></div>`;
  $('review').value = album.review || '';
  $('editorStatus').textContent = '';
  show('editorView');
}

$('saveReview').addEventListener('click', async () => {
  const st = $('editorStatus');
  st.textContent = 'SAVING…';
  st.className = 'status';
  try {
    await siteFetch('/api/v1/albums/' + encodeURIComponent(editing.slug), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ album: { review: $('review').value } }),
    });
    st.textContent = 'SAVED';
    st.className = 'status ok';
  } catch (e) {
    st.textContent = e.message;
    st.className = 'status err';
  }
});
</script>
